<!DOCTYPE html>
<html>
<head>
<title>Technician</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>👨‍🔧 Technician Panel</h1>

<div id="list"></div>

<script type="module">
import { db } from './firebase.js';
import { collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const list = document.getElementById("list");

async function load() {
  const querySnapshot = await getDocs(collection(db, "requests"));
  list.innerHTML = "";

  querySnapshot.forEach((docSnap) => {
    const data = docSnap.data();

    list.innerHTML += `
      <div class="card">
        <b>${data.title}</b><br>
        ${data.location}<br>
        Status: ${data.status}<br>
        <button onclick="complete('${docSnap.id}')">Mark Done</button>
      </div>
    `;
  });
}

window.complete = async function(id) {
  await updateDoc(doc(db, "requests", id), {
    status: "Completed"
  });
  load();
}

load();
</script>

</body>
</html>
