<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Assets Management</h1>

<div class="card">
  <input id="name" placeholder="Asset Name">
  <input id="location" placeholder="Location (HQ / Staff / Station)">
  <input id="building" placeholder="Building (A, B, 1, 2...)">
  <input id="type" placeholder="Type (HVAC / MEP)">
  <button onclick="addAsset()">Add Asset</button>
</div>

<div id="list"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { collection, addDoc, getDocs, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let role = "";

onAuthStateChanged(auth, async (user) => {

  if (!user) window.location.href = "index.html";

  const snap = await getDoc(doc(db, "users", user.uid));

  role = snap.data().role;

  // 🔐 ROLE CHECK
  if (role !== "admin" && role !== "assets_officer") {
    alert("No access");
    window.location.href = "dashboard.html";
  }

  renderSidebar(role);

  loadAssets();
});


// ➕ ADD ASSET
window.addAsset = async function () {

  await addDoc(collection(db, "assets"), {
    name: document.getElementById("name").value,
    location: document.getElementById("location").value,
    building: document.getElementById("building").value,
    type: document.getElementById("type").value,
    status: "Active"
  });

  alert("Asset Added ✔");
  loadAssets();
};


// 📄 LOAD ASSETS
async function loadAssets() {

  const snap = await getDocs(collection(db, "assets"));

  let html = "";

  snap.forEach(d => {

    const a = d.data();

    html += `
      <div class="card">
        <b>${a.name}</b><br>
        Location: ${a.location}<br>
        Building: ${a.building}<br>
        Type: ${a.type}<br>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}


// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
