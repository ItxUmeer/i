<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">Assets Management</div>
  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Assets</h2>

<input id="assetName" placeholder="Asset Name">
<input id="assetType" placeholder="Type">
<input id="assetBuilding" placeholder="Building">
<input id="assetLocation" placeholder="Location">

<button onclick="addAsset()">Add Asset</button>

<table>
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Building</th>
<th>Location</th>
<th>Status</th>
</tr>
</thead>
<tbody id="assetList"></tbody>
</table>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

/* ADD ASSET */
window.addAsset = async () => {

  await addDoc(collection(db,"assets"), {
    name: document.getElementById("assetName").value,
    type: document.getElementById("assetType").value,
    building: document.getElementById("assetBuilding").value,
    location: document.getElementById("assetLocation").value,
    status: "Active"
  });

  loadAssets();
};

/* LOAD */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "";

  snap.forEach(d=>{
    let a = d.data();

    html += `
      <tr>
        <td>${a.name}</td>
        <td>${a.type}</td>
        <td>${a.building}</td>
        <td>${a.location}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  assetList.innerHTML = html;
}

loadAssets();

</script>

</body>
</html>
