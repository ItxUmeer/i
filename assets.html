<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS CMMS - Asset Infrastructure Registers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="header-left">
        <button id="menuBtn">☰</button>
        <span class="header-title">Asset Control Infrastructure Registers</span>
    </div>
    <div class="header-search-location-bar">
        <span class="location-scope-icon">📍</span>
        <select id="assetLocationFilter" class="header-location-selector">
            <option value="all">All Properties Scope</option>
            <option value="hq">Headquarters Building</option>
            <option value="staff">Staff Accommodation</option>
            <option value="station">Outside Station Network</option>
        </select>
        <input type="text" id="assetSearchInput" class="header-global-input-search" placeholder="Search by Asset ID, Name, Serial Number or Brand...">
    </div>
    <div class="user-box">
        <span id="userRole">Validating...</span>
        <button id="logoutBtn">Logout</button>
    </div>
</div>

<div class="sidebar" id="sidebarMenu"></div>

<div class="main-content">
    <div class="dashboard-container">
        
        <div class="asset-action-row">
            <h2 class="page-title">Master Asset Catalog Registry</h2>
            <button class="btn-success" id="openAssetModalBtn" style="display:none;">➕ Add New Equipment Asset</button>
        </div>

        <div class="data-table-wrapper">
            <table class="enterprise-table">
                <thead>
                    <tr>
                        <th>Asset Tag ID</th>
                        <th>Equipment Name</th>
                        <th>AMC Category</th>
                        <th>Property Scope</th>
                        <th>Specific Location</th>
                        <th>Manufacturer</th>
                        <th>Model ID</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="assetsTableBody">
                    <tr><td colspan="8" style="text-align:center; padding:30px;">Streaming active infrastructure data nodes...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay" id="assetModal">
    <div class="modal-panel">
        <div class="modal-header">
            <h2>Register New Plant Equipment</h2>
            <button class="close-modal-btn" id="closeAssetModalBtn">×</button>
        </div>
        <form id="newAssetForm" class="modal-form">
            <div class="form-input-container">
                <label>Unique Asset ID / Tag Code</label>
                <input type="text" id="formAssetId" placeholder="e.g. DCAS-HVAC-HQ-042" required>
            </div>
            <div class="form-input-container">
                <label>Equipment Description Descriptor</label>
                <input type="text" id="formAssetName" placeholder="e.g. Chiller Package Unit 02" required>
            </div>
            <div class="form-input-container">
                <label>Service Contract Category Group</label>
                <select id="formAmcCategory" required>
                    <option value="air-conditioning">Air Conditioning Systems (HVAC)</option>
                    <option value="building-maintenance">Building Maintenance Civil</option>
                    <option value="fire-system">Fire Alarm & Fighting Systems</option>
                    <option value="cleaning-janitorial">Cleaning & Janitorial Services</option>
                </select>
            </div>
            <div class="form-input-container">
                <label>Property Scope Anchor</label>
                <select id="formLocationScope" required>
                    <option value="hq">Headquarters Building</option>
                    <option value="staff">Staff Accommodation</option>
                    <option value="station">Outside Station Network</option>
                </select>
            </div>
            <div class="form-input-container">
                <label>Specific Location Details</label>
                <input type="text" id="formSpecificLocation" placeholder="e.g. Roof Block B" required>
            </div>
            <div class="form-input-container">
                <label>Manufacturer Brand</label>
                <input type="text" id="formManufacturer" placeholder="e.g. SKM / Carrier" required>
            </div>
            <div class="form-input-container">
                <label>Model ID</label>
                <input type="text" id="formModel" placeholder="e.g. 30XA-0502" required>
            </div>
            <div class="form-input-container">
                <label>Serial Number</label>
                <input type="text" id="formSerialNumber" placeholder="e.g. SN-987456123" required>
            </div>
            <div class="form-input-container">
                <label>Installation Commission Date</label>
                <input type="date" id="formInstallationDate" required>
            </div>
            <button type="submit" class="btn-success" style="margin-top:10px; width:100%;">Commit New Document Entry</button>
        </form>
    </div>
</div>

<script type="module">
    import { db } from "./firebase.js";
    import { checkAccess } from "./roleguard.js";
    import { loadSidebar } from "./sidebar.js";
    import { collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    let localAssetsCacheArray = [];
    let applicationUserRole = "";

    // 🛡️ Verify access credentials and filter view based on role
    checkAccess((userRole) => {
        applicationUserRole = userRole;
        document.getElementById("userRole").innerText = userRole.toUpperCase();
        loadSidebar(userRole);

        // UI Access Window Lock: Only managers can generate new assets
        if (userRole === "admin" || userRole === "planner") {
            document.getElementById("openAssetModalBtn").style.display = "block";
        }
        streamMasterAssetsRegistry();
    });

    document.getElementById("logoutBtn").onclick = () => { localStorage.clear(); window.location.href = "index.html"; };

    async function streamMasterAssetsRegistry() {
        try {
            const snap = await getDocs(collection(db, "assets"));
            let baseAssets = [];
            snap.forEach(docSnap => baseAssets.push(docSnap.data()));

            // ==========================================================================
            // 🔒 ROLE-BASED VISIBILITY CONSTRAINT PIPELINE
            // ==========================================================================
            if (applicationUserRole.startsWith("contractor_")) {
                let targetCategory = "";
                if (applicationUserRole === "contractor_hvac") targetCategory = "air-conditioning";
                if (applicationUserRole === "contractor_civil") targetCategory = "building-maintenance";
                if (applicationUserRole === "contractor_fire") targetCategory = "fire-system";

                localAssetsCacheArray = baseAssets.filter(asset => asset.amcCategory === targetCategory);
            } else {
                // Admins, Planners, and Viewers read all asset nodes
                localAssetsCacheArray = baseAssets;
            }

            renderAssetsTable(localAssetsCacheArray);
        } catch (err) {
            console.error("Firestore Security Halt: ", err);
            document.getElementById("assetsTableBody").innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--danger);">Error loading assets: ${err.message}</td></tr>`;
        }
    }

    function renderAssetsTable(items) {
        const body = document.getElementById("assetsTableBody");
        if(items.length === 0) {
            body.innerHTML = `<tr><td colspan="8" style="text-align:center; color:var(--muted);">No matching equipment profiles found.</td></tr>`;
            return;
        }

        body.innerHTML = items.map(asset => `
            <tr>
                <td style="font-weight:700; color:#1e3a8a;">${asset.assetId}</td>
                <td style="font-weight:600;">${asset.assetName}</td>
                <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${asset.amcCategory}</code></td>
                <td style="text-transform:uppercase; font-size:11px; font-weight:600;">📍 ${asset.locationScope}</td>
                <td>${asset.specificLocation || 'N/A'}</td>
                <td>${asset.manufacturer || 'N/A'}</td>
                <td>${asset.model || 'N/A'}</td>
                <td><span class="badge badge-operational">${asset.status || 'operational'}</span></td>
            </tr>
        `).join('');
    }

    // Modal Controls
    const modal = document.getElementById("assetModal");
    document.getElementById("openAssetModalBtn").onclick = () => modal.classList.add("active");
    document.getElementById("closeAssetModalBtn").onclick = () => modal.classList.remove("active");

    // Form Handling with Frontend Security Restrictions
    document.getElementById("newAssetForm").onsubmit = async (e) => {
        e.preventDefault();

        // Extra guard check before calling Firestore write method
        if (applicationUserRole !== "admin" && applicationUserRole !== "planner") {
            alert("Security Violation: Your user profile does not have write access for modifying inventory databases.");
            return;
        }

        const assetIdTag = document.getElementById("formAssetId").value.trim();
        
        const payload = {
            assetId: assetIdTag,
            assetName: document.getElementById("formAssetName").value.trim(),
            amcCategory: document.getElementById("formAmcCategory").value,
            locationScope: document.getElementById("formLocationScope").value,
            specificLocation: document.getElementById("formSpecificLocation").value.trim(),
            manufacturer: document.getElementById("formManufacturer").value.trim(),
            model: document.getElementById("formModel").value.trim(),
            serialNumber: document.getElementById("formSerialNumber").value.trim(),
            installationDate: document.getElementById("formInstallationDate").value,
            status: "operational",
            updatedAt: new Date().toISOString(),
            addedBy: localStorage.getItem("uid") || "system_account"
        };

        try {
            await setDoc(doc(db, "assets", assetIdTag), payload);
            modal.classList.remove("active");
            document.getElementById("newAssetForm").reset();
            streamMasterAssetsRegistry();
        } catch (err) {
            alert("Permission Execution Fault: " + err.message);
        }
    };

    function processLiveFilters() {
        const queryVal = document.getElementById("assetSearchInput").value.toLowerCase();
        const locScope = document.getElementById("assetLocationFilter").value;

        const filtered = localAssetsCacheArray.filter(a => {
            const matchesLoc = (locScope === "all") || (a.locationScope === locScope);
            const matchesSearch = !queryVal || 
                a.assetId.toLowerCase().includes(queryVal) ||
                a.assetName.toLowerCase().includes(queryVal) ||
                (a.serialNumber && a.serialNumber.toLowerCase().includes(queryVal));
            return matchesLoc && matchesSearch;
        });
        renderAssetsTable(filtered);
    }

    document.getElementById("assetSearchInput").addEventListener("input", processLiveFilters);
    document.getElementById("assetLocationFilter").addEventListener("change", processLiveFilters);
</script>
</body>
</html>
