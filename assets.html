<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CMMS</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="workorders.html">Work Orders</a>
  <a href="assets.html">Assets</a>
  <a href="ppm.html">PPM</a>
  <a href="users.html">Users</a>

  <hr>

  <a href="#" id="logoutBtn">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>Asset Management</h2>
  <img src="logo-right.png">
</div>

<!-- ADD ASSET (ADMIN ONLY) -->
<div class="section" id="assetForm">
  <h3>Add Asset</h3>

  <div class="form-grid">
    <input id="name" placeholder="Asset Name (AHU-01)">
    <input id="type" placeholder="Type (AHU)">
    <input id="building" placeholder="Building">
    <input id="locationGroup" placeholder="Location Group">
    
    <select id="status">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
  </div>

  <h4>Checklist (Optional - comma separated)</h4>
  <input id="checklist" placeholder="Filter, Motor, Belt">

  <button onclick="addAsset()">Add Asset</button>
</div>

<!-- ASSET LIST -->
<div class="section">
  <h3>Assets</h3>
  <div id="assetList"></div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  collection, addDoc, getDocs, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let currentRole = "";

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  location="login.html";
};

// AUTH CHECK
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  currentRole = snap.data().role;

  // Hide form if not admin
  if(currentRole !== "admin"){
    document.getElementById("assetForm").style.display = "none";
  }

  loadAssets();
});

// LOAD ASSETS
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html = "";

  snap.forEach(d=>{

    const a = d.data();

    html += `
      <div class="card">
        <b>${a.name}</b> (${a.type})<br>
        ${a.locationGroup} - ${a.building}<br>
        Status: ${a.status}<br>

        <small>
          Checklist: ${a.checklist ? a.checklist.join(", ") : "None"}
        </small>

        ${
          currentRole === "admin" 
          ? `<br><button onclick="editAsset('${d.id}')">Edit</button>`
          : ""
        }
      </div>
    `;
  });

  assetList.innerHTML = html;
}

// ADD ASSET
window.addAsset = async ()=>{

  const checklistArray = checklist.value
    ? checklist.value.split(",").map(i => i.trim())
    : [];

  await addDoc(collection(db,"assets"),{
    name: name.value,
    type: type.value,
    building: building.value,
    locationGroup: locationGroup.value,
    status: status.value,
    checklist: checklistArray
  });

  alert("Asset Added ✔");

  loadAssets();
};

// EDIT ASSET (SIMPLE)
window.editAsset = async (id)=>{

  const newStatus = prompt("Enter new status (Active/Inactive)");

  if(!newStatus) return;

  await updateDoc(doc(db,"assets",id),{
    status: newStatus
  });

  loadAssets();
};

</script>

</body>
</html>
