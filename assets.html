<!DOCTYPE html>
<html>
<head>
  <title>Assets</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Assets</h2>

  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='workorders.html'">Work Orders</button>
</div>

<div class="main">

  <h1>Asset Management</h1>

  <!-- LOCATION SYSTEM -->
  <select id="locationGroup">
    <option>Headquarters</option>
    <option>Staff Accommodation</option>
    <option>Outside Stations</option>
  </select>

  <input id="building" placeholder="Building (1-5 / A-E / Station)">
  <input id="name" placeholder="Asset Name">
  <input id="type" placeholder="Type (AHU, Pump, Chiller)">

  <button onclick="addAsset()">Add Asset</button>

  <hr>

  <!-- FILTER -->
  <select id="filter" onchange="loadAssets()">
    <option>All</option>
    <option>Headquarters</option>
    <option>Staff Accommodation</option>
    <option>Outside Stations</option>
  </select>

  <div id="list"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// ➕ ADD ASSET
window.addAsset = async function () {

  await addDoc(collection(db,"assets"),{
    name: name.value,
    type: type.value,
    locationGroup: locationGroup.value,
    building: building.value,
    status: "Active"
  });

  loadAssets();
};


// 📥 LOAD ASSETS WITH FILTER
window.loadAssets = async function () {

  const snap = await getDocs(collection(db,"assets"));

  list.innerHTML = "";

  let filterValue = document.getElementById("filter").value;

  snap.forEach(doc => {

    let d = doc.data();

    if (filterValue !== "All" && d.locationGroup !== filterValue) {
      return;
    }

    list.innerHTML += `
      <div class="card">

        <b>${d.name}</b><br>
        Type: ${d.type}<br>
        Location: ${d.locationGroup}<br>
        Building: ${d.building}

      </div>
    `;
  });
};

loadAssets();

</script>

<script type="module" src="auth.js"></script>

</body>
</html>
