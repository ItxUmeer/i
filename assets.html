<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">

<style>
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tabs button {
  padding:10px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.tabs button.active {
  background:#ddd;
}

/* FORM MODAL */
.formModal {
  display:none;
  position:fixed;
  top:10%;
  left:25%;
  width:50%;
  background:#fff;
  padding:20px;
  border:1px solid #ccc;
  z-index:1000;
}

.formModal input, .formModal select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">Assets Management</div>
  <div class="header-right">
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Assets - Site Management</h2>

<!-- TABS -->
<div class="tabs">
  <button onclick="selectSite('HQ', this)" class="active">DCAS Head Quarter</button>
  <button onclick="selectSite('STAFF', this)">DCAS Staff Accommodation</button>
  <button onclick="selectSite('OUTSIDE', this)">DCAS Outside Stations</button>
</div>

<button onclick="openForm()">+ Add Asset</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Location</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="assetList"></tbody>
</table>

</div>

<!-- FORM MODAL -->
<div id="formModal" class="formModal">

<h3>Add Asset</h3>

<input id="name" placeholder="Asset Name">
<input id="category" placeholder="Category">
<input id="location" placeholder="Location">
<input id="manufacturer" placeholder="Manufacturer">
<input id="model" placeholder="Model">

<select id="status">
  <option>Active</option>
  <option>Faulty</option>
</select>

<button onclick="saveAsset()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

let currentSite = "HQ";

/* SELECT SITE */
window.selectSite = (site, btn) => {

  currentSite = site;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  loadAssets();
};

/* FORM */
window.openForm = () => formModal.style.display = "block";
window.closeForm = () => formModal.style.display = "none";

/* ADD */
window.saveAsset = async () => {

  await addDoc(collection(db,"assets"), {
    site: currentSite,
    name: name.value,
    category: category.value,
    location: location.value,
    manufacturer: manufacturer.value,
    model: model.value,
    status: status.value
  });

  closeForm();
  loadAssets();
};

/* LOAD */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "";

  snap.forEach(d=>{
    let a = d.data();

    if(a.site !== currentSite) return;

    html += `
      <tr>
        <td>${d.id}</td>
        <td>${a.name}</td>
        <td>${a.category}</td>
        <td>${a.location}</td>
        <td>${a.status}</td>
        <td>
          <button onclick="deleteAsset('${d.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  assetList.innerHTML = html;
}

/* DELETE */
window.deleteAsset = async (id) => {
  if(confirm("Delete asset?")){
    await deleteDoc(doc(db,"assets",id));
    loadAssets();
  }
};

loadAssets();

</script>

</body>
</html>
