<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Assets Management</h2>
  <img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<!-- TABS -->
<div class="tab-buttons">
  <button onclick="showTab('add')">Add Asset</button>
  <button onclick="showTab('view')">View Assets</button>
</div>

<!-- ADD -->
<div id="add" class="section">

  <h3>Add Asset</h3>

  <input id="name" placeholder="Asset Name">
  <input id="type" placeholder="Type (AHU)">
  <input id="building" placeholder="Building">
  <input id="locationGroup" placeholder="Location (HQ)">

  <button class="action-btn" onclick="addAsset()">Add Asset</button>

</div>

<!-- VIEW -->
<div id="view" class="section" style="display:none">

  <h3>Assets List</h3>

  <div id="list"></div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* NAV */
window.go = (p)=>location=p;

/* TAB */
window.showTab = (t)=>{
  add.style.display="none";
  view.style.display="none";
  document.getElementById(t).style.display="block";
};

/* ADD */
window.addAsset = async () => {

  await addDoc(collection(db,"assets"), {
    name:name.value,
    type:type.value,
    building:building.value,
    locationGroup:locationGroup.value,
    status:"Active"
  });

  alert("Asset Added ✔");
};

/* LOAD */
async function load(){

  const snap = await getDocs(collection(db,"assets"));

  let html="";

  snap.forEach(d=>{
    const a=d.data();

    html+=`<div>
      ${a.name} > ${a.type} > ${a.building} > ${a.locationGroup}
    </div>`;
  });

  list.innerHTML=html;
}

load();

</script>

</body>
</html>
