<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="header">
  <img src="logo-left.png" style="height:60px">
  <h2>Assets Module</h2>

  <button onclick="goDashboard()">Dashboard</button>
  <button onclick="logout()">Logout</button>

  <div onclick="toggleNotif()">🔔 <span id="notifCount"></span></div>

  <img src="logo-right.png" style="height:60px">
</div>

<div id="notifBox" style="display:none;position:absolute;right:10px;top:80px;background:white;border:1px solid #ccc;padding:10px;width:300px;max-height:300px;overflow:auto;"></div>

<div class="main">

<h3>Assets</h3>

<button onclick="showTab('add')">Add Asset</button>
<button onclick="showTab('list')">View Assets</button>
<button onclick="downloadPDF('assetReport')">PDF Report</button>

<div id="add">

<input id="name" placeholder="Asset Name">
<input id="type" placeholder="Type">
<input id="building" placeholder="Building">
<input id="locationGroup" placeholder="Location Group">

<button onclick="addAsset()">Save</button>

</div>

<div id="list" style="display:none">

<div id="assetReport">

<h2 style="text-align:center">CMMS Data for DCAS Facility</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Building</th>
<th>Location</th>
<th>Status</th>
</tr>
</thead>

<tbody id="assetList"></tbody>
</table>

</div>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* TAB */
window.showTab = (t) => {
  add.style.display = "none";
  list.style.display = "none";
  document.getElementById(t).style.display = "block";
};

/* ADD ASSET */
window.addAsset = async () => {

  await addDoc(collection(db,"assets"), {
    name: name.value,
    type: type.value,
    building: building.value,
    locationGroup: locationGroup.value,
    status: "Active"
  });

  await addNotification("Asset Added", name.value);

  loadAssets();
};

/* LOAD */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "";

  snap.forEach(d => {
    let a = d.data();

    html += `
      <tr>
        <td>${a.name}</td>
        <td>${a.type}</td>
        <td>${a.building}</td>
        <td>${a.locationGroup}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  assetList.innerHTML = html;
}

/* PDF */
window.downloadPDF = (id) => {
  html2pdf().from(document.getElementById(id)).save();
};

/* NOTIFICATIONS */
window.toggleNotif = () => {
  notifBox.style.display = notifBox.style.display === "none" ? "block" : "none";
};

async function addNotification(title,message){
  await addDoc(collection(db,"notifications"),{
    title,
    message,
    read:false
  });
}

async function loadNotifications(){
  const snap = await getDocs(collection(db,"notifications"));

  let html="";
  let count=0;

  snap.forEach(d=>{
    let n=d.data();
    if(!n.read) count++;

    html += `<div><b>${n.title}</b><br>${n.message}</div>`;
  });

  notifBox.innerHTML = html;
  notifCount.innerText = count ? `(${count})` : "";
}

loadAssets();
loadNotifications();
</script>

</body>
</html>
