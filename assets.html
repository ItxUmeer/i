<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Assets - CMMS DCAS</h2>
  <div onclick="toggleNotif()">🔔 <span id="notifCount"></span></div>
  <img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
  <button onclick="showTab('add')">Add Asset</button>
  <button onclick="showTab('view')">View Assets</button>
</div>

<div class="main">

<div id="add">
  <input id="name" placeholder="Name">
  <input id="type" placeholder="Type">
  <input id="building" placeholder="Building">
  <input id="locationGroup" placeholder="Location">
  <button onclick="addAsset()">Add</button>
</div>

<div id="view" style="display:none">

<button onclick="downloadPDF('assetReport')">PDF</button>

<div id="assetReport">
<h2 style="text-align:center;">CMMS Data for DCAS Facility</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Name</th><th>Type</th><th>Building</th><th>Location</th><th>Status</th>
</tr>
</thead>

<tbody id="list"></tbody>
</table>
</div>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.showTab=(t)=>{
add.style.display="none";
view.style.display="none";
document.getElementById(t).style.display="block";
};

window.addAsset=async()=>{
await addDoc(collection(db,"assets"),{
name:name.value,
type:type.value,
building:building.value,
locationGroup:locationGroup.value,
status:"Active"
});
load();
};

async function load(){
const snap=await getDocs(collection(db,"assets"));
let html="";
snap.forEach(d=>{
let a=d.data();
html+=`<tr>
<td>${a.name}</td>
<td>${a.type}</td>
<td>${a.building}</td>
<td>${a.locationGroup}</td>
<td>${a.status}</td>
</tr>`;
});
list.innerHTML=html;
}

window.downloadPDF=(id)=>{
html2pdf().from(document.getElementById(id)).save();
};

load();
</script>

</body>
</html>
