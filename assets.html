<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CMMS</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="workorders.html">Work Orders</a>
  <a href="assets.html">Assets</a>
  <a href="ppm.html">PPM</a>
  <a href="users.html">Users</a>

  <hr>

  <a href="#" id="logoutBtn">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>Asset Management</h2>
  <img src="logo-right.png">
</div>

<!-- ADD ASSET -->
<div class="section" id="assetForm">

  <h3>Add Asset</h3>

  <div class="form-grid">
    <input id="name" placeholder="Asset Name (AHU-01)">
    <input id="type" placeholder="Type (AHU)">
    <input id="building" placeholder="Building (Building 1)">
    <input id="locationGroup" placeholder="Location Group (HQ)">

    <select id="status">
      <option value="Active">Active</option>
      <option value="Inactive">Inactive</option>
    </select>
  </div>

  <br>

  <input id="checklist" placeholder="Checklist (comma separated e.g. Filter, Motor, Belt)">

  <br><br>

  <button onclick="addAsset()">Add Asset</button>

</div>

<!-- ASSET LIST -->
<div class="section">
  <h3>Assets List</h3>
  <div id="assetList"></div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let currentRole = "";

/* ---------------- LOGOUT ---------------- */
document.getElementById("logoutBtn").onclick = async () => {
  await auth.signOut();
  location = "login.html";
};

/* ---------------- AUTH CHECK ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) {
    location = "login.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    currentRole = snap.data().role;
  }

  // only admin can see form
  if (currentRole !== "admin") {
    document.getElementById("assetForm").style.display = "none";
  }

  loadAssets();
});

/* ---------------- LOAD ASSETS ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db, "assets"));

  let html = "";

  snap.forEach((d) => {

    const a = d.data();

    html += `
      <div class="card">
        <b>${a.name}</b><br>
        Type: ${a.type}<br>
        Building: ${a.building}<br>
        Location: ${a.locationGroup}<br>
        Status: ${a.status}<br>

        <small>
          Checklist: ${a.checklist ? a.checklist.join(", ") : "None"}
        </small>

        ${currentRole === "admin" ? `
          <br><button onclick="editAsset('${d.id}')">Edit</button>
        ` : ""}
      </div>
    `;
  });

  document.getElementById("assetList").innerHTML = html;
}

/* ---------------- ADD ASSET (FIXED) ---------------- */
async function addAsset() {

  console.log("ADD ASSET CLICKED");

  try {

    const checklistArray = document.getElementById("checklist").value
      ? document.getElementById("checklist").value.split(",").map(i => i.trim())
      : [];

    await addDoc(collection(db, "assets"), {
      name: document.getElementById("name").value,
      type: document.getElementById("type").value,
      building: document.getElementById("building").value,
      locationGroup: document.getElementById("locationGroup").value,
      status: document.getElementById("status").value,
      checklist: checklistArray
    });

    alert("Asset Added ✔");

    loadAssets();

    // clear fields
    document.getElementById("name").value = "";
    document.getElementById("type").value = "";
    document.getElementById("building").value = "";
    document.getElementById("locationGroup").value = "";
    document.getElementById("checklist").value = "";

  } catch (err) {
    console.error("ERROR:", err);
    alert("Error adding asset");
  }
}

/* ---------------- MAKE FUNCTION GLOBAL ---------------- */
window.addAsset = addAsset;

/* ---------------- EDIT ASSET ---------------- */
async function editAsset(id) {

  const newStatus = prompt("Enter status (Active / Inactive)");

  if (!newStatus) return;

  await updateDoc(doc(db, "assets", id), {
    status: newStatus
  });

  loadAssets();
}

window.editAsset = editAsset;

</script>

</body>
</html>
