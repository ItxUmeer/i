<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar"><h2>CMMS</h2></div>

<div class="main">

<div class="header-bar">
  <img src="logo-left.png">
  <h2>Assets</h2>
  <img src="logo-right.png">
</div>

<div class="section">
  <div class="form-grid">
    <input id="name" placeholder="Asset Name">
    <input id="building" placeholder="Building">
    <select id="location">
      <option>HQ</option>
      <option>STAFF</option>
      <option>STATION</option>
    </select>
  </div>
  <button onclick="addAsset()">Add</button>
</div>

<div id="list"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function load(){
  const snap = await getDocs(collection(db,"assets"));

  let html="";
  snap.forEach(d=>{
    html+=`<div class="card">${d.data().name}</div>`;
  });

  list.innerHTML=html;
}

window.addAsset = async ()=>{
  await addDoc(collection(db,"assets"),{
    name:name.value,
    building:building.value,
    location:location.value
  });
  load();
};

load();
</script>

</body>
</html>
