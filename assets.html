<!DOCTYPE html>
<html>
<head>
<title>Assets Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h3>CMMS Admin</h3>
  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
</div>

<div class="main">

<div class="header-bar">
  <img src="logo-left.png">
  <h2>Assets Management (Admin)</h2>
  <img src="logo-right.png">
</div>

<!-- CREATE ASSET -->
<div class="section">

  <h3>Add Asset</h3>

  <input id="name" placeholder="Asset Name">
  <input id="type" placeholder="Type (AHU, FCU)">
  <input id="building" placeholder="Building">
  <input id="locationGroup" placeholder="Location Group">

  <select id="status">
    <option value="Active">Active</option>
    <option value="Inactive">Inactive</option>
  </select>

  <input id="checklist" placeholder="Checklist (comma separated)">

  <button onclick="addAsset()">Add Asset</button>

</div>

<!-- ASSET LIST -->
<div class="section">

  <h3>Assets List</h3>

  <div id="assetList"></div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  doc,
  getDoc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- LOAD ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadAssets();
});

/* ---------------- ADD ASSET ---------------- */
window.addAsset = async () => {

  await addDoc(collection(db, "assets"), {
    name: name.value,
    type: type.value,
    building: building.value,
    locationGroup: locationGroup.value,
    status: status.value,
    checklist: checklist.value.split(",").map(i => i.trim())
  });

  alert("Asset Added ✔");
  loadAssets();
};

/* ---------------- LOAD ASSETS ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db, "assets"));

  let html = "";

  snap.forEach(d => {

    const a = d.data();

    html += `
      <div class="card">
        <b>${a.name}</b><br>
        ${a.type} | ${a.building}<br>
        ${a.status}
      </div>
    `;
  });

  document.getElementById("assetList").innerHTML = html;
}

</script>

</body>
</html>
