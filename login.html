<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DCAS Facilities CMMS - Portal Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Branding Header Area -->
            <div class="login-header">
                <img src="logo-left.png" alt="Dubai Government Logo" class="login-logo">
                <img src="logo-right.png" alt="DCAS Ambulance Logo" class="login-logo">
            </div>

            <!-- Title -->
            <div class="system-title">
                <h1>Facilities CMMS</h1>
                <p>Dubai Corporation for Ambulance Service</p>
            </div>

            <!-- Interactive Form -->
            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Enterprise Email Address</label>
                    <input type="email" id="email" autocomplete="username" placeholder="name@dcas.gov.ae" required>
                </div>

                <div class="input-group">
                    <label for="password">Security Password</label>
                    <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Sign In securely</button>
            </form>

            <div id="loginError"></div>
        </div>
    </div>

    <!-- Firebase System Hook -->
    <script type="module">
        import { login } from "./auth.js";

        const loginForm = document.getElementById("loginForm");
        const submitBtn = document.getElementById("submitBtn");
        const errorDiv = document.getElementById("loginError");

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            // Visual feedback loop
            submitBtn.disabled = true;
            submitBtn.innerText = "Authenticating identity...";
            errorDiv.innerText = "";

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                const user = await login(email, password);
                localStorage.setItem("userRole", user.role);
                window.location.href = "dashboard.html";
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.innerText = "Sign In securely";
                errorDiv.innerText = error.message;
            }
        });
    </script>
</body>
</html>
