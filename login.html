<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">
  <div class="login-box">

    <div style="display:flex;justify-content:space-between">
      <img src="logo-left.png" height="30">
      <img src="logo-right.png" height="60">
    </div>

    <h2>Login</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn">Login</button>
    <p id="msg"></p>

  </div>
</div>

<script type="module">
import { login } from "./auth.js";

loginBtn.onclick = async ()=>{
  try{
    const role = await login(email.value,password.value);

    if(role==="admin") location="dashboard.html";
    else if(role==="assets_officer") location="assets.html";
    else location="supervisor.html";

  }catch(e){
    msg.innerText = e.message;
  }
};
</script>

</body>
</html>
