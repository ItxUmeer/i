<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS Facilities CMMS - Portal Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">

        <div class="brand-identity-row">
            <img src="logo-left.png" alt="Dubai Government Emblem" class="brand-logo-frame">
            <img src="logo-right.png" alt="DCAS Ambulance Emblem" class="brand-logo-frame">
        </div>

        <div class="system-headline-group">
            <h1>Facilities CMMS</h1>
            <p>Dubai Corporation for Ambulance Service</p>
        </div>

        <form id="loginForm">
            <div class="form-input-container">
                <label>Enterprise Email Address</label>
                <input type="email" id="email" placeholder="username@dcas.gov.ae" autocomplete="email" required>
            </div>

            <div class="form-input-container">
                <label>Security Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
        </form>

        <div id="loginError"></div>
    </div>
</div>

<script type="module">
import { login } from "./auth.js";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("loginError");
    const submitBtn = document.getElementById("submitBtn");

    errorBox.innerText = "";
    submitBtn.disabled = true;
    submitBtn.innerText = "Verifying Identity...";

    try {
        const user = await login(email, password);

        if (!user || !user.role) {
            throw new Error("Authentication response valid, but user profile role structure is unassigned.");
        }

        // Clean database text for smooth matrix parsing matching role rules
        const assignedRole = user.role.toLowerCase().trim();

        // CHECKPOINT: Block deprecated trades or supervisors from trying to sign in 
        if (assignedRole.startsWith("contractor_") || assignedRole === "supervisor_viewer") {
            throw new Error("Access Denied: This legacy contractor/supervisor account structure has been deprecated. Please connect with your CMMS Administrator.");
        }

        // Store active structural roles globally
        localStorage.setItem("userRole", assignedRole);
        localStorage.setItem("role", assignedRole); // Sets duplicate key fallback protection for scripts using both references

        // Reroute straight to unified dashboard hub (Executive Dashboard / SLA KPI Matrix)
        window.location.href = "dashboard.html";

    } catch (error) {
        submitBtn.disabled = false;
        submitBtn.innerText = "Sign In";
        errorBox.innerText = error.message || "Authentication checkpoint failed. Verify your inputs.";
    }
});
</script>

</body>
</html>
