<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS Facilities - Raise Maintenance Issue</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: linear-gradient(135deg, #f1f5f9 0%, #cbd5e1 100%); }
        .public-wrapper { min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .public-card { background: #ffffff; width: 100%; max-width: 550px; padding: 40px; border-radius: 18px; box-shadow: 0 10px 25px rgba(15,23,42,0.08); }
        .public-header { text-align: center; margin-bottom: 24px; border-bottom: 1px solid #e2e8f0; padding-bottom: 16px; }
        .public-header h1 { font-size: 22px; color: #1e3a8a; font-weight: 800; }
        .success-state { text-align: center; padding: 30px 10px; display: none; }
        .success-icon { font-size: 48px; color: var(--success); margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="public-wrapper">
    <div class="public-card" id="formContainer">
        
        <div class="public-header">
            <h1>Raise Maintenance Request</h1>
            <p style="font-size:13px; color:var(--muted); margin-top:4px;">DCAS Facilities & Engineering Support Portal</p>
        </div>

        <form id="publicIssueForm" class="modal-form">
            <div class="form-input-container">
                <label>Target Property Scope</label>
                <select id="issueScope" required>
                    <option value="" disabled selected>Select location group...</option>
                    <option value="hq">Headquarters Building</option>
                    <option value="staff">Staff Accommodation</option>
                    <option value="station">Outside Station Network</option>
                </select>
            </div>

            <div class="form-input-container">
                <label>Specific Location / Zone Detail</label>
                <input type="text" id="issueLocationDetail" placeholder="e.g., Station 4 Al Barsha, Server Room Grid B" required>
            </div>

            <div class="form-input-container">
                <label>Maintenance Discipline Category</label>
                <select id="issueCategory" required>
                    <option value="" disabled selected>Select service group...</option>
                    <option value="air-conditioning">1. Air Conditioning (HVAC)</option>
                    <option value="building-maintenance">2. Building Maintenance Civil</option>
                    <option value="fire-system">3. Fire & Safety Systems</option>
                    <option value="elevators">4. Elevators & Lifts</option>
                </select>
            </div>

            <div class="form-input-container">
                <label>Issue Description & Urgent Indicators</label>
                <textarea id="issueDescription" style="width: 100%; height: 100px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; font-size: 14px; resize: none; outline: none;" placeholder="Provide explicit details regarding the breakdown or fault..." required></textarea>
            </div>

            <div class="form-input-container">
                <label>Urgency Priority Level</label>
                <select id="issuePriority" required>
                    <option value="low">Low (Routine Check)</option>
                    <option value="medium" selected>Medium (Standard Repair)</option>
                    <option value="high">High (Operational Impact)</option>
                    <option value="critical">Critical (Emergency Breakdown)</option>
                </select>
            </div>

            <button type="submit" class="btn-primary" id="submitIssueBtn" style="margin-top:10px;">Submit Request</button>
        </form>

        <div class="success-state" id="successState">
            <div class="success-icon">✓</div>
            <h2 style="color:#0f172a; font-weight:700; font-size:20px;">Request Lodged Successfully</h2>
            <p style="color:var(--muted); font-size:14px; margin-top:8px;" id="ticketTrackingId"></p>
            <button class="btn-primary" style="margin-top:24px; max-width:200px;" onclick="window.location.reload()">File Another Issue</button>
        </div>

    </div>
</div>

<script type="module">
    import { db } from "./firebase.js";
    import { collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    document.getElementById("publicIssueForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("submitIssueBtn");
        btn.disabled = true;
        btn.innerText = "Transmitting to Admin System...";

        const referenceId = "TKT-" + Math.floor(100000 + Math.random() * 900000);

        const ticketPayload = {
            ticketId: referenceId,
            type: "reactive",
            locationScope: document.getElementById("issueScope").value,
            specificLocation: document.getElementById("issueLocationDetail").value.trim(),
            amcCategory: document.getElementById("issueCategory").value,
            description: document.getElementById("issueDescription").value.trim(),
            priority: document.getElementById("issuePriority").value,
            status: "pending_approval", // Admin triage required
            reportedDate: new Date().toISOString(),
            assignedContractorUid: null,
            resolvedDate: null
        };

        try {
            await addDoc(collection(db, "maintenance_tickets"), ticketPayload);
            document.getElementById("publicIssueForm").style.display = "none";
            document.getElementById("ticketTrackingId").innerText = `Tracking Code: ${referenceId}`;
            document.getElementById("successState").style.display = "block";
        } catch (error) {
            alert("Submission error: " + error.message);
            btn.disabled = false;
            btn.innerText = "Submit Request";
        }
    });
</script>

</body>
</html>
