<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CMMS Login - Dubai Facilities</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .box {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #msg {
      margin-top: 10px;
      font-size: 13px;
      text-align: center;
      color: #fbbf24;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>CMMS LOGIN</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button id="loginBtn">Login</button>

  <div id="msg"></div>
</div>

<!-- FIREBASE SCRIPT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

console.log("CMMS LOGIN LOADED ✔");

// 🔥 YOUR FIREBASE CONFIG (REPLACE THIS)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_ID",
  appId: "YOUR_APP_ID"
};

// INIT FIREBASE
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN BUTTON
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Please enter email & password";
    return;
  }

  msg.innerText = "Logging in...";

  try {

    // AUTH LOGIN
    const userCred = await signInWithEmailAndPassword(auth, email, password);

    const uid = userCred.user.uid;

    // GET ROLE FROM FIRESTORE
    const snap = await getDoc(doc(db, "users", uid));

    if (!snap.exists()) {
      msg.innerText = "User profile not found in database";
      return;
    }

    const role = snap.data().role;

    console.log("ROLE:", role);

    // ROLE ROUTING
    if (role === "admin") {
      window.location.href = "dashboard.html";
    }

    else if (role === "assets_officer") {
      window.location.href = "assets.html";
    }

    else if (role === "facilities_supervisor") {
      window.location.href = "supervisor.html";
    }

    else {
      msg.innerText = "Invalid role assigned";
    }

  }

  catch (error) {
    console.error("LOGIN ERROR:", error);
    msg.innerText = error.message;
  }

});

</script>

</body>
</html>
