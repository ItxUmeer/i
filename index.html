<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMMS Login</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#f4f7fb;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  background:white;
  border-bottom:2px solid #1e88e5;
}

.header img{
  height:70px;
}

/* CENTER CONTAINER */
.container{
  height:85vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGIN BOX */
.login-box{
  width:100%;
  max-width:420px;
  background:white;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(0,0,0,0.1);
}

/* TITLE */
.login-box h2{
  text-align:center;
  margin-bottom:20px;
  color:#1e88e5;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1e88e5;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  background:#1565c0;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:10px;
  font-size:12px;
  color:#777;
}

/* MOBILE FIX */
@media(max-width:600px){

  .header img{
    height:55px;
  }

  .login-box{
    margin:0 15px;
  }
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-left.png">
  <h3 style="color:#1e88e5;">CMMS LOGIN</h3>
  <img src="logo-right.png">
</div>

<!-- LOGIN CENTER -->
<div class="container">

  <div class="login-box">

    <h2>Welcome Back</h2>

    <input id="email" type="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  CMMS System for DCAS Facility Management
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.login = async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    await signInWithEmailAndPassword(auth,email,password);

    localStorage.setItem("login","true");

    window.location.href = "dashboard.html";

  } catch(err){
    alert("Login Failed: " + err.message);
  }
};

</script>

</body>
</html>
