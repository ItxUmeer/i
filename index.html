<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS Facilities CMMS - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">
        <div class="system-title">
            <h1>DCAS CMMS Portal</h1>
            <p>Facilities & Asset Management Control Suite</p>
        </div>

        <form id="loginForm" class="modal-form">
            <div class="input-group">
                <label>System Email Address</label>
                <input type="email" id="loginEmail" placeholder="username@dcas.gov.ae" required>
            </div>

            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="loginSubmitBtn" style="margin-top: 10px;">
                Authenticate Account
            </button>
            <div id="loginError" style="color: var(--danger); font-size: 13px; margin-top: 10px; font-weight: 600; text-align: center;"></div>
        </form>
    </div>
</div>

<script type="module">
    import { auth, db } from "./firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("loginSubmitBtn");
        const errDiv = document.getElementById("loginError");
        
        btn.disabled = true;
        btn.innerText = "Verifying Credentials...";
        errDiv.innerText = "";

        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        try {
            // 1. Authenticate with Firebase Auth Core
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. Fetch the custom Role configuration document from Firestore
            const userDocRef = doc(db, "users", user.uid);
            const userDocSnap = await getDoc(userDocRef);

            if (userDocSnap.exists()) {
                const userData = userDocSnap.data();
                const systemRole = userData.role; // e.g., 'admin', 'planner', 'contractor_hvac'

                if (!systemRole) {
                    throw new Error("Role property missing from your database profile object.");
                }

                // 3. 🧼 FLUSH STALE STORAGE & COMMIT FRESH AUTHORIZATION PARAMS
                localStorage.clear();
                localStorage.setItem("uid", user.uid);
                localStorage.setItem("role", systemRole.toLowerCase().trim());
                localStorage.setItem("email", user.email);

                // 4. Dispatch directly to the main workspace control center
                window.location.href = "dashboard.html";
            } else {
                throw new Error("Your user profile UID string key was not found inside the users Firestore collection registry.");
            }

        } catch (error) {
            console.error("Login Exception:", error);
            // Provide localized hints for administrative mapping oversights
            if (error.message.includes("Firestore")) {
                errDiv.innerText = "Security Halt: Account exists but profile is missing in Firestore /users collection.";
            } else {
                errDiv.innerText = "Authentication Failed: " + error.message;
            }
            btn.disabled = false;
            btn.innerText = "Authenticate Account";
        }
    });
</script>

</body>
</html>
