<!DOCTYPE html>
<html>
<head>
  <title>CMMS Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      cursor: pointer;
      color: black;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    #msg {
      margin-top: 10px;
      font-size: 12px;
    }
  </style>
</head>
<script>
document.addEventListener("DOMContentLoaded", () => {

  const btn = document.getElementById("loginBtn");
  const msg = document.getElementById("msg");

  btn.addEventListener("click", () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      msg.innerText = "Please enter email & password";
      return;
    }

    msg.innerText = "Login button works ✔ (Firebase not added yet)";
  });

});
</script>
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

console.log("🔥 Firebase loading...");

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  msg.innerText = "Logging in...";

  try {

    const userCred = await signInWithEmailAndPassword(auth, email, password);

    const uid = userCred.user.uid;

    const userSnap = await getDoc(doc(db, "users", uid));

    if (!userSnap.exists()) {
      msg.innerText = "User not found in Firestore";
      return;
    }

    const role = userSnap.data().role;

    console.log("ROLE:", role);

    if (role === "admin") {
      window.location.href = "dashboard.html";
    }

    else if (role === "assets_officer") {
      window.location.href = "assets.html";
    }

    else if (role === "facilities_supervisor") {
      window.location.href = "supervisor.html";
    }

    else {
      msg.innerText = "Invalid role";
    }

  }

  catch (error) {
    console.error(error);
    msg.innerText = error.message;
  }

});
</script>
<body>

<div class="box">
  <h2>CMMS LOGIN</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>

  <div id="msg"></div>
</div>

</body>
</html>
