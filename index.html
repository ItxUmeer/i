<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS Facilities CMMS - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

<div class="login-wrapper">
    <div class="login-card">
        <div class="system-title">
            <h1>DCAS CMMS Portal</h1>
            <p>Facilities & Asset Management Control Suite</p>
        </div>

        <form id="loginForm" class="modal-form">
            <div class="input-group">
                <label>System Email Address</label>
                <input type="email" id="loginEmail" placeholder="username@dcas.gov.ae" required>
            </div>

            <div class="input-group">
                <label>Security Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary" id="loginSubmitBtn" style="margin-top: 10px;">
                Authenticate Account
            </button>
            <div id="loginError" style="color: red; font-size: 13px; margin-top: 10px; font-weight: 600; text-align: center;"></div>
        </form>
    </div>
</div>

<script type="module">
    // 🔗 Routing authentication handling through the central auth.js script helper
    import { login } from "./auth.js";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("loginSubmitBtn");
        const errDiv = document.getElementById("loginError");
        
        btn.disabled = true;
        btn.innerText = "Verifying Credentials...";
        errDiv.innerText = "";

        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        try {
            // Process core authentication and dynamic role extraction safely
            const sessionProfile = await login(email, password);

            // 🧼 Flush old session state data tokens from browser cache memory
            localStorage.clear();
            localStorage.setItem("uid", sessionProfile.uid);
            localStorage.setItem("email", sessionProfile.email);
            
            // 🔥 FIXED: Set both storage properties explicitly to keep roleguard.js completely synchronized
            localStorage.setItem("role", sessionProfile.role);
            localStorage.setItem("userRole", sessionProfile.role);

            // Dispatch user into the live application system space
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error("Login Page Catch Exception:", error);
            errDiv.innerText = "Authentication Failed: " + error.message;
            btn.disabled = false;
            btn.innerText = "Authenticate Account";
        }
    });
</script>

</body>
</html>
