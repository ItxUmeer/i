<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CMMS | DCAS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #0a0f1c, #111a2e);
      color: #00e6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      padding: 40px;
      border: 1px solid rgba(0, 230, 255, 0.3);
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0, 230, 255, 0.2);
      background: rgba(10, 15, 28, 0.8);
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    h2 {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 30px;
    }

    .line {
      width: 80px;
      height: 2px;
      background: #00e6ff;
      margin: 20px auto;
      box-shadow: 0 0 10px #00e6ff;
    }

    .btn {
      padding: 12px 25px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #00e6ff;
      color: #000;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px #00e6ff;
    }

    .btn:hover {
      background: #00bcd4;
      box-shadow: 0 0 20px #00e6ff;
    }

    .footer {
      margin-top: 25px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>CMMS SYSTEM</h1>
  <div class="line"></div>
  
  <h2>Dubai Corporation for Ambulance Services</h2>

  <p>Computerized Maintenance Management System</p>

  <button class="btn" onclick="enterSystem()">ENTER SYSTEM</button>

  <div class="footer">
    © 2026 DCAS | Maintenance Division
  </div>
</div>

<script>
function enterSystem() {
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
