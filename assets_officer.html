<!DOCTYPE html>
<html>
<head>
<title>Assets Officer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Assets Officer Dashboard</h2>
  <img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
  <button onclick="showTab('wo')">Work Orders</button>
  <button onclick="showTab('create')">Create WO</button>
  <button onclick="showTab('assets')">Assets</button>
  <button onclick="showTab('ppm')">PPM</button>
</div>

<div class="main">

<!-- WORK ORDERS -->
<div id="wo" class="section">

  <h3>Work Orders</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Title</th>
        <th>Asset</th>
        <th>Location</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="woList"></tbody>
  </table>

</div>

<!-- CREATE WO -->
<div id="create" class="section" style="display:none">

  <h3>Create Work Order</h3>

  <input id="title" placeholder="Title">
  <select id="assetSelect"></select>
  <input id="location" placeholder="Location">
  <input id="subLocation" placeholder="Sub Location">

  <button onclick="createWO()">Create</button>

</div>

<!-- ASSETS -->
<div id="assets" class="section" style="display:none">

  <h3>Assets</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Building</th>
      </tr>
    </thead>

    <tbody id="assetList"></tbody>
  </table>

</div>

<!-- PPM -->
<div id="ppm" class="section" style="display:none">

  <h3>PPM</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Asset</th>
        <th>Task</th>
        <th>Next Due</th>
      </tr>
    </thead>

    <tbody id="ppmList"></tbody>
  </table>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  addDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* TAB */
window.showTab = (t)=>{
  wo.style.display="none";
  create.style.display="none";
  assets.style.display="none";
  ppm.style.display="none";
  document.getElementById(t).style.display="block";
};

/* LOAD WORK ORDERS */
async function loadWO(){

  const snap = await getDocs(collection(db,"workOrders"));

  let html="";

  snap.forEach(d=>{
    const w=d.data();

    html+=`
      <tr>
        <td>${w.title}</td>
        <td>${w.assetId}</td>
        <td>${w.location}</td>
        <td>${w.status}</td>
      </tr>
    `;
  });

  woList.innerHTML=html;
}

/* LOAD ASSETS */
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html="";
  let opt="";

  snap.forEach(d=>{
    const a=d.data();

    html+=`
      <tr>
        <td>${a.name}</td>
        <td>${a.type}</td>
        <td>${a.building}</td>
      </tr>
    `;

    opt+=`<option value="${a.name}">${a.name}</option>`;
  });

  assetList.innerHTML=html;
  assetSelect.innerHTML=opt;
}

/* LOAD PPM */
async function loadPPM(){

  const snap = await getDocs(collection(db,"ppm"));

  let html="";

  snap.forEach(d=>{
    const p=d.data();

    html+=`
      <tr>
        <td>${p.assetId}</td>
        <td>${p.task}</td>
        <td>${p.nextDue}</td>
      </tr>
    `;
  });

  ppmList.innerHTML=html;
}

/* CREATE WO */
window.createWO = async () => {

  await addDoc(collection(db,"workOrders"), {
    title:title.value,
    assetId:assetSelect.value,
    location:location.value,
    subLocation:subLocation.value,
    status:"Pending"
  });

  alert("Created");
  loadWO();
};

/* INIT */
loadWO();
loadAssets();
loadPPM();

</script>

</body>
</html>
