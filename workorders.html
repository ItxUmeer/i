<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">Work Orders</div>
  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Work Orders</h2>

<!-- FORM -->
<input id="woTitle" placeholder="Title">

<select id="woAsset"></select>

<input id="woLocation" placeholder="Location">
<input id="woSubLocation" placeholder="Sub Location">

<select id="woPriority">
  <option>Low</option>
  <option>Medium</option>
  <option>High</option>
  <option>Critical</option>
</select>

<select id="woStatus">
  <option>Open</option>
  <option>In Progress</option>
  <option>Completed</option>
</select>

<input id="woTechnician" placeholder="Assign Technician">

<button onclick="addWorkOrder()">Create Work Order</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Asset</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="woList"></tbody>
</table>

</div>

<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc;">
  <h3>Work Order Details</h3>
  <div id="popupContent"></div>
  <button onclick="closePopup()">Close</button>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

let currentEditId = null;
let assetsMap = {};

/* GENERATE ID */
function generateWOId() {
  return "WO-" + Math.floor(Math.random() * 100000);
}

/* LOAD ASSETS INTO DROPDOWN */
async function loadAssetsDropdown() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "<option value=''>Select Asset</option>";

  snap.forEach(d=>{
    let a = d.data();

    assetsMap[d.id] = a;

    html += `<option value="${d.id}">${a.name} (${a.assetId})</option>`;
  });

  woAsset.innerHTML = html;
}

/* AUTO FILL LOCATION FROM ASSET */
woAsset.onchange = () => {
  let a = assetsMap[woAsset.value];
  if(a){
    woLocation.value = a.location || "";
  }
};

/* ADD */
window.addWorkOrder = async () => {

  let assetData = assetsMap[woAsset.value] || {};

  await addDoc(collection(db,"workorders"), {
    woId: generateWOId(),
    title: woTitle.value,
    assetId: woAsset.value,
    assetName: assetData.name || "",
    location: woLocation.value,
    subLocation: woSubLocation.value,
    priority: woPriority.value,
    status: woStatus.value,
    technician: woTechnician.value,
    createdAt: serverTimestamp()
  });

  loadWO();
};

/* LOAD */
async function loadWO() {

  const snap = await getDocs(collection(db,"workorders"));

  let html = "";

  snap.forEach(d=>{
    let w = d.data();

    html += `
      <tr onclick="viewWO('${d.id}')">
        <td>${w.woId}</td>
        <td>${w.title}</td>
        <td>${w.assetName}</td>
        <td>${w.priority}</td>
        <td>${w.status}</td>
        <td>
          <button onclick="event.stopPropagation(); editWO('${d.id}')">Edit</button>
          <button onclick="event.stopPropagation(); deleteWO('${d.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  woList.innerHTML = html;
}

/* VIEW */
window.viewWO = async (id) => {

  const snap = await getDocs(collection(db,"workorders"));

  snap.forEach(d=>{
    if(d.id === id){
      let w = d.data();

      popupContent.innerHTML = `
        <b>ID:</b> ${w.woId}<br>
        <b>Title:</b> ${w.title}<br>
        <b>Asset:</b> ${w.assetName}<br>
        <b>Location:</b> ${w.location}<br>
        <b>Sub Location:</b> ${w.subLocation}<br>
        <b>Priority:</b> ${w.priority}<br>
        <b>Status:</b> ${w.status}<br>
        <b>Technician:</b> ${w.technician}<br>
      `;

      popup.style.display = "block";
    }
  });
};

window.closePopup = () => popup.style.display = "none";

/* DELETE */
window.deleteWO = async (id) => {
  if(confirm("Delete this work order?")){
    await deleteDoc(doc(db,"workorders",id));
    loadWO();
  }
};

/* EDIT */
window.editWO = async (id) => {

  const snap = await getDocs(collection(db,"workorders"));

  snap.forEach(d=>{
    if(d.id === id){
      let w = d.data();

      woTitle.value = w.title;
      woAsset.value = w.assetId;
      woLocation.value = w.location;
      woSubLocation.value = w.subLocation;
      woPriority.value = w.priority;
      woStatus.value = w.status;
      woTechnician.value = w.technician;

      currentEditId = id;
    }
  });

  document.querySelector("button[onclick='addWorkOrder()']").innerText = "Update Work Order";
  document.querySelector("button[onclick='addWorkOrder()']").onclick = updateWO;
};

/* UPDATE */
window.updateWO = async () => {

  let assetData = assetsMap[woAsset.value] || {};

  await updateDoc(doc(db,"workorders",currentEditId), {
    title: woTitle.value,
    assetId: woAsset.value,
    assetName: assetData.name || "",
    location: woLocation.value,
    subLocation: woSubLocation.value,
    priority: woPriority.value,
    status: woStatus.value,
    technician: woTechnician.value
  });

  currentEditId = null;

  document.querySelector("button").innerText = "Create Work Order";
  document.querySelector("button").onclick = addWorkOrder;

  loadWO();
};

/* INIT */
loadAssetsDropdown();
loadWO();

</script>

</body>
</html>
