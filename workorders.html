<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">

<style>
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tabs button {
  padding:10px;
  border:1px solid #ccc;
  background:#fff;
}

.tabs button.active {
  background:#ddd;
}

/* FORM */
.formModal {
  display:none;
  position:fixed;
  top:10%;
  left:25%;
  width:50%;
  background:#fff;
  padding:20px;
  border:1px solid #ccc;
}

.formModal input, .formModal select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">Work Orders</div>
  <div class="header-right">
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Work Orders - Site Based</h2>

<!-- SITE TABS -->
<div class="tabs">
  <button onclick="selectSite('HQ', this)" class="active">DCAS Head Quarter</button>
  <button onclick="selectSite('STAFF', this)">DCAS Staff Accommodation</button>
  <button onclick="selectSite('OUTSIDE', this)">DCAS Outside Stations</button>
</div>

<button onclick="openForm()">+ Create Work Order</button>

<table>
<thead>
<tr>
<th>Title</th>
<th>Asset</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="woList"></tbody>
</table>

</div>

<!-- FORM -->
<div id="formModal" class="formModal">

<h3>Create Work Order</h3>

<input id="woTitle" placeholder="Title">

<select id="woAsset"></select>

<input id="woLocation" placeholder="Location">

<select id="woPriority">
  <option>Low</option>
  <option>Medium</option>
  <option>High</option>
  <option>Critical</option>
</select>

<select id="woStatus">
  <option>Open</option>
  <option>In Progress</option>
  <option>Completed</option>
</select>

<input id="woTechnician" placeholder="Technician">

<button onclick="saveWO()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

let currentSite = "HQ";
let assetsMap = {};

/* SELECT SITE */
window.selectSite = (site, btn) => {

  currentSite = site;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  loadAssets();
  loadWO();
};

/* FORM */
window.openForm = () => {
  formModal.style.display = "block";
  loadAssets();
};

window.closeForm = () => formModal.style.display = "none";

/* LOAD ASSETS (FILTER BY SITE) */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "<option>Select Asset</option>";
  assetsMap = {};

  snap.forEach(d=>{
    let a = d.data();

    if(a.site !== currentSite) return;

    assetsMap[d.id] = a;

    html += `<option value="${d.id}">${a.name}</option>`;
  });

  woAsset.innerHTML = html;
}

/* AUTO FILL LOCATION */
woAsset.onchange = () => {
  let a = assetsMap[woAsset.value];
  if(a) woLocation.value = a.location || "";
};

/* ADD */
window.saveWO = async () => {

  let a = assetsMap[woAsset.value];

  await addDoc(collection(db,"workorders"), {
    site: currentSite,
    title: woTitle.value,
    assetId: woAsset.value,
    assetName: a?.name || "",
    location: woLocation.value,
    priority: woPriority.value,
    status: woStatus.value,
    technician: woTechnician.value,
    createdAt: new Date()
  });

  closeForm();
  loadWO();
};

/* LOAD */
async function loadWO() {

  const snap = await getDocs(collection(db,"workorders"));

  let html = "";

  snap.forEach(d=>{
    let w = d.data();

    if(w.site !== currentSite) return;

    html += `
      <tr>
        <td>${w.title}</td>
        <td>${w.assetName}</td>
        <td>${w.priority}</td>
        <td>${w.status}</td>
        <td>
          <button onclick="deleteWO('${d.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  woList.innerHTML = html;
}

/* DELETE */
window.deleteWO = async (id) => {
  if(confirm("Delete work order?")){
    await deleteDoc(doc(db,"workorders",id));
    loadWO();
  }
};

/* INIT */
loadAssets();
loadWO();

</script>

</body>
</html>
