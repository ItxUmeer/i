<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">
<h2>Work Orders</h2>
<div id="list"></div>
</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function load(){
  const snap = await getDocs(collection(db,"workOrders"));

  let html="";
  snap.forEach(d=>{
    const w=d.data();

    let cls="status-open";
    if(w.status==="In Progress") cls="status-progress";
    if(w.status==="Closed") cls="status-closed";

    html+=`<div class="card ${cls}">${w.title}</div>`;
  });

  list.innerHTML=html;
}

load();
</script>

</body>
</html>
