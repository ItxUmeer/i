<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">Work Orders</div>
  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Work Orders</h2>

<input id="woTitle" placeholder="Title">

<select id="woAsset"></select>

<input id="woLocation" placeholder="Location">
<input id="woSubLocation" placeholder="Sub Location">
<input id="woComment" placeholder="Comment">

<button onclick="addWO()">Create Work Order</button>

<table>
<thead>
<tr>
<th>Title</th>
<th>Asset</th>
<th>Location</th>
<th>Sub</th>
<th>Comment</th>
<th>Status</th>
</tr>
</thead>
<tbody id="woList"></tbody>
</table>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

/* LOAD ASSETS */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option>Select Asset</option>`;

  snap.forEach(d=>{
    html += `<option value="${d.data().name}">${d.data().name}</option>`;
  });

  woAsset.innerHTML = html;
}

/* ADD WORK ORDER */
window.addWO = async () => {

  await addDoc(collection(db,"workOrders"), {
    title: woTitle.value,
    asset: woAsset.value,
    location: woLocation.value,
    subLocation: woSubLocation.value,
    comment: woComment.value,
    status: "Pending"
  });

  loadWO();
};

/* LOAD */
async function loadWO() {

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d=>{
    let w = d.data();

    html += `
      <tr>
        <td>${w.title}</td>
        <td>${w.asset}</td>
        <td>${w.location}</td>
        <td>${w.subLocation}</td>
        <td>${w.comment}</td>
        <td>${w.status}</td>
      </tr>
    `;
  });

  woList.innerHTML = html;
}

loadAssets();
loadWO();

</script>

</body>
</html>
