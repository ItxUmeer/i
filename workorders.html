<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">

<style>

body {
  background:#f5f7fb;
  font-family:Arial;
}

/* SIDEBAR FIX */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#0f172a;
  color:white;
  padding:15px;
}

.sidebar a {
  display:block;
  color:#cbd5e1;
  padding:10px;
  text-decoration:none;
}

/* MAIN */
.main {
  margin-left:240px;
  padding:20px;
}

/* SECTION BOX */
.section {
  background:white;
  padding:15px;
  border:2px solid #2563eb;
  border-radius:10px;
  margin-bottom:20px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:5px 0;
}

/* BUTTON */
button {
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

/* WORK ORDER ROW STYLE */
.wo-row {
  background:white;
  margin-bottom:10px;
  padding:12px;
  border-radius:8px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.wo-row span {
  background:#f1f5f9;
  padding:5px 10px;
  border-radius:5px;
}

.badge {
  padding:5px 10px;
  border-radius:6px;
  color:white;
}

.green { background:#22c55e; }
.orange { background:#f59e0b; }
.red { background:#ef4444; }

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>CMMS</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="assets_list.html">Assets List</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Work Order Management</h2>

<!-- CREATE SECTION -->
<div class="section">

  <h3>Create Work Order</h3>

  <input id="title" placeholder="Work Order Title">

  <select id="assetId"></select>

  <input id="location" placeholder="Location (HQ / Building 1)">
  <input id="subLocation" placeholder="Sub Location (Floor / Room)">

  <select id="assignedTo">
    <option value="">Select Supervisor</option>
  </select>

  <button onclick="createWO()">Create Work Order</button>

</div>

<!-- LIST SECTION -->
<div class="section">

  <h3>Work Order List</h3>

  <div id="list">Loading...</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- AUTH ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadAssets();
  loadSupervisors();
  loadWorkOrders();
});

/* ---------------- LOAD ASSETS ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d => {
    const a = d.data();

    html += `<option value="${a.name}">${a.name}</option>`;
  });

  document.getElementById("assetId").innerHTML = html;
}

/* ---------------- LOAD SUPERVISORS (FIXED AUTO ASSIGN) ---------------- */
async function loadSupervisors() {

  const snap = await getDocs(collection(db,"users"));

  let html = `<option value="">Select Supervisor</option>`;

  snap.forEach(d => {

    const u = d.data();

    if (u.role === "facilities_supervisor") {

      html += `<option value="${d.id}">
        ${u.name || d.id}
      </option>`;
    }
  });

  document.getElementById("assignedTo").innerHTML = html;
}

/* ---------------- CREATE WORK ORDER ---------------- */
window.createWO = async () => {

  const asset = document.getElementById("assetId").value;
  const title = document.getElementById("title").value;
  const location = document.getElementById("location").value;
  const subLocation = document.getElementById("subLocation").value;
  const assignedTo = document.getElementById("assignedTo").value;

  await addDoc(collection(db,"workOrders"), {
    title,
    assetId: asset,
    location,
    subLocation,
    assignedTo,
    status: "Pending"
  });

  alert("Work Order Created ✔");

  loadWorkOrders();
};

/* ---------------- LOAD WORK ORDERS (SINGLE LINE STYLE) ---------------- */
async function loadWorkOrders() {

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    let color = "orange";
    if (w.status === "Completed") color = "green";
    if (w.status === "Started") color = "orange";
    if (w.status === "Pending") color = "red";

    html += `
      <div class="wo-row">

        <span><b>${w.title}</b></span>
        <span>${w.assetId}</span>
        <span>${w.location || "-"}</span>
        <span>${w.subLocation || "-"}</span>

        <span class="badge ${color}">
          ${w.status}
        </span>

      </div>
    `;
  });

  document.getElementById("list").innerHTML =
    html || "No Work Orders";
}

</script>

</body>
</html>
