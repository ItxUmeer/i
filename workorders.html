<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">

<style>

body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#0b1220;
  color:white;
  padding:15px;
}

.sidebar a {
  display:block;
  color:#cbd5e1;
  padding:10px;
  text-decoration:none;
}

.sidebar a:hover {
  background:#1f2937;
}

/* MAIN */
.main {
  margin-left:220px;
  padding:20px;
}

/* FORM BOX */
.section {
  background:white;
  padding:15px;
  border-left:5px solid #2563eb;
  border-radius:8px;
  margin-bottom:20px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

/* BUTTON */
button {
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* FULL WIDTH LIST */
.list {
  width:100%;
}

/* WORK ORDER ROW (DARK + HIGH CONTRAST) */
.wo-row {
  width:100%;
  background:#111827;
  color:white;
  margin-bottom:10px;
  padding:15px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

/* COLUMN STYLE */
.wo-row span {
  background:#1f2937;
  padding:6px 10px;
  border-radius:5px;
  font-size:13px;
  color:#e5e7eb;
}

/* STATUS BADGES */
.badge {
  padding:6px 12px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
}

.pending { background:#dc2626; }
.started { background:#f59e0b; }
.completed { background:#16a34a; }

h2 {
  margin-bottom:15px;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>CMMS</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="assets_list.html">Assets List</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Work Order Management</h2>

<!-- CREATE WORK ORDER -->
<div class="section">

  <h3>Create Work Order</h3>

  <input id="title" placeholder="Work Order Title">

  <select id="assetId"></select>

  <input id="location" placeholder="Location (HQ / Building)">
  <input id="subLocation" placeholder="Sub Location (Floor / Room)">

  <select id="assignedTo">
    <option value="">Auto Assign / Select Supervisor</option>
  </select>

  <button onclick="createWO()">Send Work Order</button>

</div>

<!-- LIST -->
<div class="list">

  <h3>Work Order List</h3>

  <div id="list">Loading...</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- LOAD ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadAssets();
  loadSupervisors();
  loadWorkOrders();
});

/* ---------------- ASSETS ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d => {
    const a = d.data();
    html += `<option value="${a.name}">${a.name}</option>`;
  });

  document.getElementById("assetId").innerHTML = html;
}

/* ---------------- SUPERVISOR FIX (AUTO LOAD) ---------------- */
async function loadSupervisors() {

  const snap = await getDocs(collection(db,"users"));

  let html = `<option value="">Auto Assign Supervisor</option>`;

  snap.forEach(d => {

    const u = d.data();

    if (u.role === "facilities_supervisor") {

      html += `
        <option value="${d.id}">
          ${u.name || u.email || d.id}
        </option>
      `;
    }
  });

  document.getElementById("assignedTo").innerHTML = html;
}

/* ---------------- AUTO ASSIGN LOGIC ---------------- */
function getAutoSupervisor() {

  const select = document.getElementById("assignedTo");

  // if user didn't select → auto assign first supervisor
  if (!select.value) {
    return select.options[1]?.value || "";
  }

  return select.value;
}

/* ---------------- CREATE WORK ORDER ---------------- */
window.createWO = async () => {

  const assignedTo = getAutoSupervisor();

  const data = {
    title: document.getElementById("title").value,
    assetId: document.getElementById("assetId").value,
    location: document.getElementById("location").value,
    subLocation: document.getElementById("subLocation").value,
    assignedTo: assignedTo || null,
    status: "Pending",
    createdAt: new Date()
  };

  await addDoc(collection(db,"workOrders"), data);

  alert("Work Order Sent ✔ (Auto Assigned)");

  loadWorkOrders();
};

/* ---------------- WORK ORDER LIST (FULL WIDTH DARK UI) ---------------- */
async function loadWorkOrders() {

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    let statusClass = "pending";
    if (w.status === "Started") statusClass = "started";
    if (w.status === "Completed") statusClass = "completed";

    html += `
      <div class="wo-row">

        <span><b>${w.title}</b></span>
        <span>${w.assetId || "-"}</span>
        <span>${w.location || "-"}</span>
        <span>${w.subLocation || "-"}</span>

        <span class="badge ${statusClass}">
          ${w.status}
        </span>

      </div>
    `;
  });

  document.getElementById("list").innerHTML =
    html || "No Work Orders";
}

</script>

</body>
</html>
