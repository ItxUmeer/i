<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">

<style>

/* GLOBAL */
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
  color:#111827;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:230px;
  height:100vh;
  background:#0f172a;
  color:white;
  padding:15px;
  border-right:3px solid #2563eb; /* separation FIX */
}

.sidebar a {
  display:block;
  color:#cbd5e1;
  padding:10px;
  text-decoration:none;
}

.sidebar a:hover {
  background:#1f2937;
}

/* MAIN AREA (PROPER SEPARATION FIX) */
.main {
  margin-left:250px; /* stronger separation */
  padding:25px;
}

/* PAGE TITLE */
h2 {
  color:#111827;
  margin-bottom:15px;
}

/* SECTION BOX */
.section {
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-bottom:20px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #d1d5db;
  border-radius:6px;
}

/* BUTTON */
button {
  background:#2563eb;
  color:white;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* LIST WRAPPER */
.list {
  width:100%;
}

/* WORK ORDER ROW (CLEAN LIGHT THEME) */
.wo-row {
  background:white;
  border:1px solid #e5e7eb;
  margin-bottom:10px;
  padding:12px;
  border-radius:8px;

  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;

  color:#111827; /* FIX: dark text */
}

/* TEXT BLOCKS */
.wo-row span {
  background:#f9fafb;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  color:#111827; /* FIX: black text */
}

/* STATUS COLORS */
.badge {
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
  color:white;
}

.pending { background:#dc2626; }
.started { background:#f59e0b; }
.completed { background:#16a34a; }

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>CMMS</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="assets_list.html">Assets List</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>Work Orders</h2>

<!-- CREATE SECTION -->
<div class="section">

  <h3>Create Work Order</h3>

  <input id="title" placeholder="Title">

  <select id="assetId"></select>

  <input id="location" placeholder="Location (HQ / Building)">
  <input id="subLocation" placeholder="Sub Location (Floor / Room)">

  <select id="assignedTo">
    <option value="">Auto Assign Supervisor</option>
  </select>

  <button onclick="createWO()">Create Work Order</button>

</div>

<!-- LIST SECTION -->
<div class="list">

  <h3>All Work Orders</h3>

  <div id="list">Loading...</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- AUTH ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadAssets();
  loadSupervisors();
  loadWorkOrders();
});

/* ---------------- LOAD ASSETS ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d => {
    const a = d.data();
    html += `<option value="${a.name}">${a.name}</option>`;
  });

  document.getElementById("assetId").innerHTML = html;
}

/* ---------------- SUPERVISOR LOAD FIX ---------------- */
async function loadSupervisors() {

  const snap = await getDocs(collection(db,"users"));

  let html = `<option value="">Auto Assign Supervisor</option>`;

  snap.forEach(d => {

    const u = d.data();

    if (u.role === "facilities_supervisor") {

      html += `
        <option value="${d.id}">
          ${u.name || u.email || d.id}
        </option>
      `;
    }
  });

  document.getElementById("assignedTo").innerHTML = html;
}

/* ---------------- AUTO ASSIGN ---------------- */
function getSupervisor() {

  const val = document.getElementById("assignedTo").value;

  if (val) return val;

  // fallback auto assign first supervisor
  const select = document.getElementById("assignedTo");

  return select.options[1]?.value || "";
}

/* ---------------- CREATE ---------------- */
window.createWO = async () => {

  await addDoc(collection(db,"workOrders"), {
    title: title.value,
    assetId: assetId.value,
    location: location.value,
    subLocation: subLocation.value,
    assignedTo: getSupervisor(),
    status: "Pending",
    createdAt: new Date()
  });

  alert("Work Order Created ✔");

  loadWorkOrders();
};

/* ---------------- LOAD WORK ORDERS (VISIBLE TO ALL USERS) ---------------- */
async function loadWorkOrders() {

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    let color = "pending";
    if (w.status === "Started") color = "started";
    if (w.status === "Completed") color = "completed";

    html += `
      <div class="wo-row">

        <span><b>${w.title}</b></span>
        <span>${w.assetId}</span>
        <span>${w.location}</span>
        <span>${w.subLocation}</span>

        <span class="badge ${color}">
          ${w.status}
        </span>

      </div>
    `;
  });

  document.getElementById("list").innerHTML =
    html || "No Work Orders";
}

</script>

</body>
</html>
