<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo-left.png" style="height:60px">
  <h2>Work Orders</h2>

  <button onclick="goDashboard()">Dashboard</button>
  <button onclick="logout()">Logout</button>

  <div onclick="toggleNotif()">🔔 <span id="notifCount"></span></div>

  <img src="logo-right.png" style="height:60px">
</div>

<div id="notifBox" style="display:none;position:absolute;right:10px;top:80px;background:white;border:1px solid #ccc;padding:10px;width:300px;max-height:300px;overflow:auto;"></div>

<div class="main">

<button onclick="showTab('create')">Create</button>
<button onclick="showTab('list')">List</button>

<div id="create">

<input id="title">
<select id="assetSelect"></select>
<input id="location">
<input id="comment">

<button onclick="createWO()">Create</button>

</div>

<div id="list" style="display:none">

<button onclick="downloadPDF('woReport')">PDF</button>

<div id="woReport">

<h2 style="text-align:center">CMMS Data for DCAS Facility</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Title</th>
<th>Asset</th>
<th>Status</th>
<th>Comment</th>
<th>Action</th>
</tr>
</thead>

<tbody id="woList"></tbody>
</table>

</div>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* CREATE */
window.createWO = async () => {

  await addDoc(collection(db,"workOrders"), {
    title: title.value,
    assetId: assetSelect.value,
    location: location.value,
    status: "Pending"
  });

  await addNotification("Work Order Created", title.value);

  loadWO();
};

/* LOAD */
async function loadWO(){

  const snap = await getDocs(collection(db,"workOrders"));

  let html="";

  snap.forEach(d=>{
    let w=d.data();

    html += `
    <tr>
      <td>${w.title}</td>
      <td>${w.assetId}</td>
      <td>${w.status}</td>
      <td><input id="c-${d.id}"></td>
      <td>
        <button onclick="startWO('${d.id}')">Start</button>
        <button onclick="completeWO('${d.id}')">Complete</button>
      </td>
    </tr>`;
  });

  woList.innerHTML = html;
}

/* SUPERVISOR ACTIONS */
window.startWO = async (id) => {
  let c = document.getElementById("c-"+id)?.value || "";

  await updateDoc(doc(db,"workOrders",id), {
    status:"Started",
    comment:c
  });

  await addNotification("Started", c);

  loadWO();
};

window.completeWO = async (id) => {
  let c = document.getElementById("c-"+id)?.value || "";

  await updateDoc(doc(db,"workOrders",id), {
    status:"Completed",
    comment:c
  });

  await addNotification("Completed", c);

  loadWO();
};

/* NOTIFICATIONS */
window.toggleNotif = () => {
  notifBox.style.display = notifBox.style.display === "none" ? "block" : "none";
};

async function addNotification(title,message){
  await addDoc(collection(db,"notifications"),{
    title,message,read:false
  });
}

async function loadNotifications(){
  const snap = await getDocs(collection(db,"notifications"));

  let html="";
  let count=0;

  snap.forEach(d=>{
    let n=d.data();
    if(!n.read) count++;
    html+=`<div><b>${n.title}</b><br>${n.message}</div>`;
  });

  notifBox.innerHTML = html;
  notifCount.innerText = count ? `(${count})` : "";
}

loadWO();
loadNotifications();
</script>

</body>
</html>
