<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
<script src="html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="header">
<img src="logo-left.png" class="logo">
<h2>Work Orders</h2>
<img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
<button onclick="showTab('create')">Create</button>
<button onclick="showTab('list')">List</button>
</div>

<div class="main">

<div id="create">
<input id="title" placeholder="Title">
<select id="assetSelect"></select>
<input id="location">
<input id="subLocation">
<button onclick="createWO()">Create</button>
</div>

<div id="list" style="display:none">

<button onclick="downloadPDF('woReport')">PDF</button>

<div id="woReport">
<h2 style="text-align:center;">CMMS Data for DCAS Facility</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Title</th><th>Asset</th><th>Status</th>
</tr>
</thead>

<tbody id="woList"></tbody>
</table>
</div>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function loadAssets(){
let snap=await getDocs(collection(db,"assets"));
let html="";
snap.forEach(d=>{
html+=`<option>${d.data().name}</option>`;
});
assetSelect.innerHTML=html;
}

window.createWO=async()=>{
await addDoc(collection(db,"workOrders"),{
title:title.value,
assetId:assetSelect.value,
status:"Pending"
});
loadWO();
};

async function loadWO(){
let snap=await getDocs(collection(db,"workOrders"));
let html="";
snap.forEach(d=>{
let w=d.data();
html+=`<tr>
<td>${w.title}</td>
<td>${w.assetId}</td>
<td>${w.status}</td>
</tr>`;
});
woList.innerHTML=html;
}

window.downloadPDF=(id)=>{
html2pdf().from(document.getElementById(id)).save();
};

loadAssets();
loadWO();
</script>

</body>
</html>
