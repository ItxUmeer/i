<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Work Order Management</h2>
  <img src="logo-right.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- TABS -->
<div class="tab-buttons">
  <button onclick="showTab('create')">Create Work Order</button>
  <button onclick="showTab('list')">Work Order List</button>
</div>

<!-- CREATE -->
<div id="create" class="section">

  <h3>Create Work Order</h3>

  <input id="title" placeholder="Work Order Title">

  <!-- ASSET SELECT -->
  <select id="assetSelect"></select>

  <input id="location" placeholder="Location (HQ / Building)">
  <input id="subLocation" placeholder="Sub Location (Floor / Room)">

  <button class="action-btn" onclick="createWO()">Create Work Order</button>

</div>

<!-- LIST -->
<div id="list" class="section" style="display:none">

  <h3>Work Order List</h3>

  <div id="woList"></div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* NAV */
window.go = (p)=>location=p;

/* TAB SWITCH */
window.showTab = (t)=>{
  create.style.display="none";
  list.style.display="none";
  document.getElementById(t).style.display="block";
};

/* LOAD ASSETS */
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d=>{
    const a = d.data();

    html += `
      <option value="${a.name}">
        ${a.name} (${a.building})
      </option>
    `;
  });

  document.getElementById("assetSelect").innerHTML = html;
}

/* CREATE WORK ORDER */
window.createWO = async () => {

  if(!assetSelect.value){
    alert("Select Asset");
    return;
  }

  await addDoc(collection(db,"workOrders"), {
    title: title.value,
    assetId: assetSelect.value,
    location: location.value,
    subLocation: subLocation.value,
    status: "Pending",
    createdAt: new Date()
  });

  alert("Work Order Created ✔");

  loadWO();
};

/* LOAD WORK ORDERS (GLOBAL FOR ALL USERS) */
async function loadWO(){

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d=>{

    const w = d.data();

    let color = "#dc2626"; // pending red
    if(w.status === "Started") color = "#f59e0b";
    if(w.status === "Completed") color = "#16a34a";

    html += `
      <div style="
        background:white;
        padding:12px;
        margin-bottom:10px;
        border-radius:8px;
        border-left:5px solid ${color};
      ">

        <b>${w.title}</b><br>

        ${w.assetId} > ${w.location} > ${w.subLocation}<br>

        <span style="color:${color}; font-weight:bold;">
          ${w.status}
        </span>

      </div>
    `;
  });

  document.getElementById("woList").innerHTML =
    html || "No Work Orders";
}

/* INIT */
loadAssets();
loadWO();

</script>

</body>
</html>
