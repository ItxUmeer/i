<!DOCTYPE html>
<html>
<head>
<title>Work Orders</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Work Orders</h2>
  <img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<div class="tab-buttons">
  <button onclick="showTab('create')">Create</button>
  <button onclick="showTab('list')">List</button>
</div>

<!-- CREATE -->
<div id="create" class="section">

  <input id="title" placeholder="Title">
  <select id="assetSelect"></select>
  <input id="location" placeholder="Location">
  <input id="subLocation" placeholder="Sub Location">

  <button class="action-btn" onclick="createWO()">Create</button>

</div>

<!-- LIST -->
<div id="list" class="section" style="display:none">

  <button onclick="exportWO()">Export</button>

  <table border="1" width="100%" id="woTable">
    <thead>
      <tr>
        <th>Title</th>
        <th>Asset</th>
        <th>Location</th>
        <th>Sub Location</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="woList"></tbody>
  </table>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;

window.showTab = (t)=>{
  create.style.display="none";
  list.style.display="none";
  document.getElementById(t).style.display="block";
};

async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option>Select Asset</option>`;

  snap.forEach(d=>{
    const a=d.data();
    html+=`<option value="${a.name}">${a.name}</option>`;
  });

  assetSelect.innerHTML=html;
}

window.createWO = async () => {

  await addDoc(collection(db,"workOrders"), {
    title:title.value,
    assetId:assetSelect.value,
    location:location.value,
    subLocation:subLocation.value,
    status:"Pending"
  });

  alert("Created");
  loadWO();
};

async function loadWO(){

  const snap = await getDocs(collection(db,"workOrders"));

  let html="";

  snap.forEach(d=>{
    const w=d.data();

    html+=`
      <tr>
        <td>${w.title}</td>
        <td>${w.assetId}</td>
        <td>${w.location}</td>
        <td>${w.subLocation}</td>
        <td>${w.status}</td>
      </tr>
    `;
  });

  woList.innerHTML=html;
}

window.exportWO = () => {
  let table = document.getElementById("woTable").outerHTML;
  let a = document.createElement("a");
  a.href = "data:application/vnd.ms-excel," + encodeURIComponent(table);
  a.download = "workorders.xls";
  a.click();
};

loadAssets();
loadWO();

</script>

</body>
</html>
