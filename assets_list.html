<!DOCTYPE html>
<html>
<head>
<title>Assets List</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  background:#f5f7fb;
  font-family:Arial;
}

.section {
  padding:20px;
}

.asset-row {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  font-size:14px;
}

.asset-row span {
  padding:6px 10px;
  border-radius:6px;
  background:#f1f5f9;
}

.badge {
  padding:5px 10px;
  border-radius:6px;
  color:white;
  font-size:12px;
}

.green { background:#22c55e; }
.red { background:#ef4444; }
.orange { background:#f59e0b; }
.blue { background:#2563eb; }

.title {
  font-weight:bold;
  color:#111827;
}
</style>

</head>

<body>

<h2 style="text-align:center;">Assets List View</h2>

<div class="section" id="list">Loading...</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- LOAD ASSETS ---------------- */
async function load() {

  const snap = await getDocs(collection(db, "assets"));

  let html = "";

  snap.forEach(d => {

    const a = d.data();

    // ---- PPM STATUS LOGIC (temporary smart display) ----
    let ppmStatus = "Service Due";
    let color = "orange";

    if (a.status === "Inactive") {
      ppmStatus = "Not Active";
      color = "red";
    } else {
      // simulate service state (you will later connect real ppm)
      const rand = Math.random();

      if (rand > 0.6) {
        ppmStatus = "Serviced";
        color = "green";
      } else if (rand > 0.3) {
        ppmStatus = "Due Soon";
        color = "orange";
      } else {
        ppmStatus = "Overdue";
        color = "red";
      }
    }

    html += `
      <div class="asset-row">

        <span class="title">${a.name || "-"}</span>
        <span>${a.type || "-"}</span>
        <span>${a.building || "-"}</span>
        <span>${a.locationGroup || "-"}</span>
        <span>Monthly</span>

        <span class="badge ${color}">
          ${ppmStatus}
        </span>

      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

load();

</script>

</body>
</html>
