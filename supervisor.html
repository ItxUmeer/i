<!DOCTYPE html>
<html>
<head>
<title>Supervisor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Facilities Supervisor</h1>

<div id="list"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { doc, getDoc, collection, getDocs, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let role = "";

onAuthStateChanged(auth, async (user) => {

  if (!user) window.location.href = "index.html";

  const snap = await getDoc(doc(db, "users", user.uid));

  role = snap.data().role;

  if (role !== "facilities_supervisor" && role !== "admin") {
    alert("No access");
    window.location.href = "dashboard.html";
  }

  renderSidebar(role);

  loadWO();
});

async function loadWO() {

  const snap = await getDocs(collection(db, "workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    html += `
      <div class="card">
        <b>${w.title}</b><br>
        Asset: ${w.asset}<br>
        Status: ${w.status}<br>
        Priority: ${w.priority}<br>

        <button onclick="approve('${d.id}')">Approve</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

window.approve = async function(id) {
  await updateDoc(doc(db, "workOrders", id), {
    status: "Approved"
  });

  loadWO();
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
