<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Facility Supervisor Panel</title>
<link rel="stylesheet" href="style.css">

<style>
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab {
  padding: 10px;
  background: #e2e8f0;
  border-radius: 6px;
  cursor: pointer;
}

.tab.active {
  background: #0ea5e9;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>DCAS CMMS</h2>
  <div id="menu"></div>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<h1>Facility Supervisor Follow-Up</h1>

<div class="tabs">
  <div class="tab active" data-tab="wo">Work Orders</div>
  <div class="tab" data-tab="ppm">PPM Tasks</div>
</div>

<div id="content"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { collection, getDocs, doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let userId = "";
let currentTab = "wo";

// ✅ FIX LOGOUT (WORKS ALWAYS)
document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "index.html";
});

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  userId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  const role = snap.data().role;

  if (role !== "facilities_supervisor" && role !== "maintenance") {
    window.location.href = "dashboard.html";
    return;
  }

  renderSidebar(role);

  setupTabs();
  loadData();
});

// ✅ FIX TAB CLICK (NO EVENT BUG)
function setupTabs() {
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");

      currentTab = tab.dataset.tab;
      loadData();
    });
  });
}

// 📥 LOAD DATA
async function loadData() {
  if (currentTab === "wo") loadWorkOrders();
  else loadPPM();
}


// 🛠 WORK ORDERS (FOLLOW-UP ONLY)
async function loadWorkOrders() {

  const snap = await getDocs(collection(db, "workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    if (w.assignedTo !== userId) return;

    let cls = "status-open";
    if (w.status === "In Progress") cls = "status-progress";
    if (w.status === "Closed") cls = "status-closed";

    html += `
      <div class="card ${cls}">
        <b>${w.title}</b><br>
        Asset: ${w.asset}<br>
        Status: ${w.status}<br>

        <textarea id="c_${d.id}" placeholder="Update / Follow-up"></textarea>

        ${woButtons(d.id, w.status)}
      </div>
    `;
  });

  document.getElementById("content").innerHTML =
    html || "<p>No assigned work orders</p>";
}


// 🔘 WORK ORDER BUTTONS (NO APPROVE)
function woButtons(id, status) {

  if (status === "Open") {
    return `<button onclick="updateStatus('${id}','In Progress','workOrders')">Start Work</button>`;
  }

  if (status === "In Progress") {
    return `<button onclick="updateStatus('${id}','Closed','workOrders')">Close Work</button>`;
  }

  return "";
}


// 🟣 PPM FOLLOW-UP
async function loadPPM() {

  const snap = await getDocs(collection(db, "ppm"));

  let html = "";

  snap.forEach(d => {

    const p = d.data();

    if (p.assignedTo !== userId) return;

    let cls = "status-open";
    if (p.status === "In Progress") cls = "status-progress";
    if (p.status === "Completed") cls = "status-closed";

    html += `
      <div class="card ${cls}">
        <b>${p.asset}</b><br>
        Due: ${p.nextDue}<br>
        Status: ${p.status}<br>

        <textarea id="c_${d.id}" placeholder="PPM update"></textarea>

        ${ppmButtons(d.id, p.status)}
      </div>
    `;
  });

  document.getElementById("content").innerHTML =
    html || "<p>No assigned PPM tasks</p>";
}


// 🔘 PPM BUTTONS
function ppmButtons(id, status) {

  if (status === "Pending") {
    return `<button onclick="updateStatus('${id}','In Progress','ppm')">Start PPM</button>`;
  }

  if (status === "In Progress") {
    return `<button onclick="updateStatus('${id}','Completed','ppm')">Complete</button>`;
  }

  return "";
}


// 🔄 UPDATE STATUS
window.updateStatus = async function(id, status, col) {

  const comment = document.getElementById("c_" + id).value;

  await updateDoc(doc(db, col, id), {
    status: status,
    comments: comment
  });

  loadData();
};

</script>

</body>
</html>
