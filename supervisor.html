<!DOCTYPE html>
<html>
<head>
<title>Supervisor Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>Supervisor</h3>

  <a href="supervisor.html">My Tasks</a>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>Facility Supervisor Dashboard</h2>
  <img src="logo-right.png">
</div>

<!-- WORK ORDERS -->
<div class="section">
  <h3>My Work Orders</h3>
  <div id="workList">Loading...</div>
</div>

<!-- PPM -->
<div class="section">
  <h3>My PPM Tasks</h3>
  <div id="ppmList">Loading...</div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  query,
  where
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

let uid = "";

/* ---------------- AUTH ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) {
    location = "login.html";
    return;
  }

  uid = user.uid;

  loadWorkOrders();
  loadPPM();
});

/* ---------------- WORK ORDERS (ONLY ASSIGNED) ---------------- */
async function loadWorkOrders() {

  const q = query(
    collection(db, "workOrders"),
    where("assignedTo", "==", uid)
  );

  const snap = await getDocs(q);

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    html += `
      <div class="card">
        <b>${w.title}</b><br>
        Status: ${w.status}<br>

        <button onclick="updateWO('${d.id}', 'Started')">Start</button>
        <button onclick="updateWO('${d.id}', 'Completed')">Complete</button>

        <br><br>
        <input id="c_${d.id}" placeholder="Add comment">
        <button onclick="addComment('${d.id}')">Send</button>
      </div>
    `;
  });

  document.getElementById("workList").innerHTML =
    html || "No assigned work orders";
}

/* ---------------- PPM (ONLY ASSIGNED) ---------------- */
async function loadPPM() {

  const q = query(
    collection(db, "ppm"),
    where("assignedTo", "==", uid)
  );

  const snap = await getDocs(q);

  let html = "";

  snap.forEach(d => {

    const p = d.data();

    html += `
      <div class="card">
        <b>${p.assetId}</b><br>
        Task: ${p.task || "-"}<br>
        Status: ${p.status}<br>

        <button onclick="completePPM('${d.id}')">
          Complete
        </button>
      </div>
    `;
  });

  document.getElementById("ppmList").innerHTML =
    html || "No assigned PPM tasks";
}

/* ---------------- UPDATE WORK ORDER ---------------- */
window.updateWO = async (id, status) => {

  await updateDoc(doc(db, "workOrders", id), {
    status: status
  });

  loadWorkOrders();
};

/* ---------------- ADD COMMENT ---------------- */
window.addComment = async (id) => {

  const text = document.getElementById("c_" + id).value;

  if (!text) return;

  const ref = doc(db, "workOrders", id);
  const snap = await getDoc(ref);

  const data = snap.data();

  const comments = data.comments || [];

  comments.push({
    text: text,
    time: new Date().toISOString(),
    user: uid
  });

  await updateDoc(ref, { comments });

  loadWorkOrders();
};

/* ---------------- COMPLETE PPM ---------------- */
window.completePPM = async (id) => {

  await updateDoc(doc(db, "ppm", id), {
    status: "Completed"
  });

  loadPPM();
};

/* ---------------- LOGOUT ---------------- */
window.logout = async () => {
  await auth.signOut();
  location = "login.html";
};

</script>

</body>
</html>
