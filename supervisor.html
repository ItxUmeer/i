<!DOCTYPE html>
<html>
<head>
<title>Supervisor Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>Supervisor Dashboard</h2>
  <img src="logo-right.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="showTab('wo')">Work Orders</button>
  <button onclick="showTab('ppm')">PPM Schedule</button>
  <button onclick="showTab('assets')">Assets</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- WORK ORDERS -->
<div id="wo" class="section">

  <h3>Work Orders</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Title</th>
        <th>Asset</th>
        <th>Location</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="woList"></tbody>
  </table>

</div>

<!-- PPM -->
<div id="ppm" class="section" style="display:none">

  <h3>PPM Schedule</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Asset</th>
        <th>Task</th>
        <th>Next Due</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="ppmList"></tbody>
  </table>

</div>

<!-- ASSETS -->
<div id="assets" class="section" style="display:none">

  <h3>Assets</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Building</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody id="assetList"></tbody>
  </table>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* TAB SWITCH */
window.showTab = (t)=>{
  wo.style.display="none";
  ppm.style.display="none";
  assets.style.display="none";
  document.getElementById(t).style.display="block";
};

/* LOAD WORK ORDERS */
async function loadWO(){

  const snap = await getDocs(collection(db,"workOrders"));

  let html="";

  snap.forEach(d=>{
    const w=d.data();

    html+=`
      <tr>
        <td>${w.title}</td>
        <td>${w.assetId}</td>
        <td>${w.location}</td>
        <td>${w.status}</td>
        <td>
          <button onclick="startWO('${d.id}')">Start</button>
          <button onclick="completeWO('${d.id}')">Complete</button>
        </td>
      </tr>
    `;
  });

  woList.innerHTML=html;
}

/* UPDATE STATUS */
window.startWO = async (id)=>{
  await updateDoc(doc(db,"workOrders",id),{status:"Started"});
  loadWO();
};

window.completeWO = async (id)=>{
  await updateDoc(doc(db,"workOrders",id),{status:"Completed"});
  loadWO();
};

/* LOAD PPM */
async function loadPPM(){

  const snap = await getDocs(collection(db,"ppm"));

  let html="";

  snap.forEach(d=>{
    const p=d.data();

    html+=`
      <tr>
        <td>${p.assetId}</td>
        <td>${p.task}</td>
        <td>${p.nextDue}</td>
        <td>${p.status}</td>
      </tr>
    `;
  });

  ppmList.innerHTML=html;
}

/* LOAD ASSETS */
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html="";

  snap.forEach(d=>{
    const a=d.data();

    html+=`
      <tr>
        <td>${a.name}</td>
        <td>${a.type}</td>
        <td>${a.building}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  assetList.innerHTML=html;
}

/* INIT */
loadWO();
loadPPM();
loadAssets();

</script>

</body>
</html>
