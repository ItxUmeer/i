<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Facility Supervisor Panel</title>
<link rel="stylesheet" href="style.css">

<style>
.tabs {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.tab {
  padding: 10px;
  background: #e2e8f0;
  border-radius: 6px;
  cursor: pointer;
}

.tab.active {
  background: #0ea5e9;
  color: white;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
  <a href="#" onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Facility Supervisor Tasks</h1>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('wo')">Work Orders</div>
  <div class="tab" onclick="switchTab('ppm')">PPM Tasks</div>
</div>

<div id="content"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { collection, getDocs, doc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let userId = "";
let currentTab = "wo";

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  userId = user.uid;

  const snap = await getDoc(doc(db, "users", user.uid));
  const role = snap.data().role;

  if (role !== "facilities_supervisor" && role !== "maintenance") {
    alert("Access denied");
    window.location.href = "dashboard.html";
    return;
  }

  renderSidebar(role);

  loadData();
});


// 🔄 SWITCH TAB
window.switchTab = function(tab) {

  currentTab = tab;

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");

  loadData();
};


// 📥 LOAD DATA (ONLY ASSIGNED)
async function loadData() {

  if (currentTab === "wo") {
    loadWorkOrders();
  } else {
    loadPPM();
  }
}


// 🛠 LOAD ASSIGNED WORK ORDERS
async function loadWorkOrders() {

  const snap = await getDocs(collection(db, "workOrders"));

  let html = "";

  snap.forEach(d => {

    const w = d.data();

    // 🔥 ONLY SHOW ASSIGNED
    if (w.assignedTo !== userId) return;

    let cls = "status-open";
    if (w.status === "In Progress") cls = "status-progress";
    if (w.status === "Closed") cls = "status-closed";

    html += `
      <div class="card ${cls}">
        <b>${w.title}</b><br>
        Asset: ${w.asset}<br>
        Status: ${w.status}<br>

        <textarea id="c_${d.id}" placeholder="Add comment"></textarea>

        ${buildButtons(d.id, w.status, "workOrders")}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html || "No assigned work orders";
}


// 🟣 LOAD ASSIGNED PPM
async function loadPPM() {

  const snap = await getDocs(collection(db, "ppm"));

  let html = "";

  snap.forEach(d => {

    const p = d.data();

    if (p.assignedTo !== userId) return;

    let cls = "status-open";
    if (p.status === "In Progress") cls = "status-progress";
    if (p.status === "Completed") cls = "status-closed";

    html += `
      <div class="card ${cls}">
        <b>${p.asset}</b><br>
        Due: ${p.nextDue}<br>
        Status: ${p.status}<br>

        <textarea id="c_${d.id}" placeholder="Add comment"></textarea>

        ${buildButtons(d.id, p.status, "ppm")}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html || "No assigned PPM tasks";
}


// 🔘 BUTTON LOGIC
function buildButtons(id, status, collectionName) {

  if (status === "Open" || status === "Pending") {
    return `<button onclick="updateStatus('${id}','Accepted','${collectionName}')">Accept</button>`;
  }

  if (status === "Accepted") {
    return `<button onclick="updateStatus('${id}','In Progress','${collectionName}')">Start Work</button>`;
  }

  if (status === "In Progress") {
    return `<button onclick="updateStatus('${id}','Closed','${collectionName}')">Close</button>`;
  }

  return "";
}


// 🔄 UPDATE STATUS
window.updateStatus = async function(id, status, col) {

  const comment = document.getElementById("c_" + id).value;

  await updateDoc(doc(db, col, id), {
    status: status,
    comments: comment
  });

  loadData();
};


// 🔐 LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
