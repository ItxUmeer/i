<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS CMMS - Work Orders Triage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <div class="header-left">
        <button id="menuBtn">☰</button>
        <span class="header-title">Work Orders Triage</span>
    </div>
    
    <div class="header-search-location-bar">
        <span class="location-scope-icon">📍</span>
        <select id="globalLocationFilter" class="header-location-selector">
            <option value="all">All 3 Property Scopes</option>
            <option value="hq">Headquarters Building</option>
            <option value="staff">Staff Accommodation</option>
            <option value="station">Outside Station Network</option>
        </select>
        <input type="text" id="tableGlobalSearch" class="header-global-input-search" placeholder="Search by Ticket ID, asset descriptor, or category...">
    </div>

    <div class="user-box">
        <span id="userRole">Loading Matrix...</span>
        <button id="logoutBtn">Logout</button>
    </div>
</div>

<div class="sidebar" id="sidebarMenu"></div>

<div class="main-content">
    <div class="dashboard-container">
        
        <div class="asset-action-row">
            <h2 class="page-title" id="ticketsPageTitleContext">Reactive Maintenance Registry</h2>
            <button class="btn-success" id="openCreateTicketPanelBtn" style="display: none;">
                ➕ Create Internal Work Order
            </button>
        </div>

        <div class="data-table-wrapper">
            <table class="enterprise-table">
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Request Riser</th>
                        <th>Property Scope</th>
                        <th>Specific Location</th>
                        <th>Service Group</th>
                        <th>Issue Details</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Reported Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ticketsTableBody">
                    <tr>
                        <td colspan="10" style="text-align: center; padding: 40px; color: var(--muted);">
                            Connecting securely to Firestore cluster streams...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<div class="modal-overlay" id="createTicketModal">
    <div class="modal-panel">
        <div class="modal-header">
            <h2>Log Internal Maintenance Work Order</h2>
            <button class="close-modal-btn" id="closeCreateModalBtn">×</button>
        </div>
        
        <form id="internalCreateTicketForm" class="modal-form">
            <div class="form-input-container">
                <label>Request Riser Details</label>
                <input type="text" id="createRiserDetails" placeholder="e.g. Facilities Desk / Operator Name" required>
            </div>

            <div class="form-input-container">
                <label>Target Property Scope</label>
                <select id="createScope" required>
                    <option value="" disabled selected>Select location group...</option>
                    <option value="hq">Headquarters Building</option>
                    <option value="staff">Staff Accommodation</option>
                    <option value="station">Outside Station Network</option>
                </select>
            </div>

            <div class="form-input-container">
                <label>Specific Location / Zone Detail</label>
                <input type="text" id="createLocationDetail" placeholder="e.g. HQ Server Room, Block B Roof" required>
            </div>

            <div class="form-input-container">
                <label>Maintenance Discipline Category</label>
                <select id="createCategory" required>
                    <option value="" disabled selected>Select service group...</option>
                    <option value="building-maintenance">1. Building Maintenance Services</option>
                    <option value="swimming-pool">2. Swimming Pool Maintenance Services</option>
                    <option value="cleaning-services">3. Internal & External Cleaning Services</option>
                    <option value="pest-control">4. Pest Control Services</option>
                    <option value="security-safety-lifeguard">5. Security, Safety, and Lifeguard Services</option>
                    <option value="elevator-maintenance">6. Elevator Maintenance Services</option>
                    <option value="air-conditioning">7. Air Conditioning Equipment Maintenance Services</option>
                    <option value="fire-systems">8. Fire Systems Maintenance Services</option>
                    <option value="security-systems">9. Security Systems Maintenance Services</option>
                    <option value="audio-visual">10. Audio-Visual Maintenance Services</option>
                    <option value="sewage-pumping">11. Sewage Pumping Services</option>
                    <option value="medical-waste">12. Medical Waste Transportation Services</option>
                    <option value="general-waste">13. General Waste Transportation Services</option>
                    <option value="landscaping">14. Internal & External Landscaping Maintenance</option>
                    <option value="flagpole-maintenance">15. Flagpole Maintenance & Flag Replacement</option>
                    <option value="human-resources">16. Human Resources Obligations</option>
                </select>
            </div>

            <div class="form-input-container">
                <label>Urgency Priority Level</label>
                <select id="createPriority" required>
                    <option value="low">Low (Routine Check)</option>
                    <option value="medium" selected>Medium (Standard Repair)</option>
                    <option value="high">High (Operational Impact)</option>
                    <option value="critical">Critical (Emergency Breakdown)</option>
                </select>
            </div>

            <div class="form-input-container">
                <label>Issue Description</label>
                <textarea id="createDescription" placeholder="Provide breakdown diagnostic analysis notes details..." required></textarea>
            </div>

            <button type="submit" class="btn-primary" id="submitInternalTicketBtn" style="margin-top: 16px;">Transmit & Authorize Order</button>
        </form>
    </div>
</div>

<div class="modal-overlay" id="ticketActionDrawer">
    <div class="modal-panel">
        <div class="modal-header">
            <h2 id="drawerTicketIdTitle">Review Ticket</h2>
            <button class="close-modal-btn" id="closeDrawerBtn">×</button>
        </div>
        
        <form id="drawerActionForm" class="modal-form">
            <input type="hidden" id="targetDocumentFirestoreId">
            
            <div class="form-input-container">
                <label>Issue Summary</label>
                <textarea id="drawerIssueDescription" readonly style="background: #f8fafc; border-color: var(--border); font-weight: 500; min-height: 80px; resize: none;"></textarea>
            </div>

            <div id="adminRoutingControls" style="display: none; flex-direction: column; gap: 14px;">
                <div class="form-input-container" id="contractorAssignmentContainer">
                    <label>Assign Specialized Service Contractor</label>
                    <select id="drawerContractorAssignment" required>
                        <option value="" disabled selected>Select execution contractor...</option>
                        <option value="contractor_civil">Al Fajer (Building & Civil Maintenance)</option>
                        <option value="contractor_pool">Al Fajer (Swimming Pool Maintenance)</option>
                        <option value="contractor_cleaning">Al Fajer (Cleaning Services)</option>
                        <option value="contractor_pest">Al Fajer (Pest Control)</option>
                        <option value="contractor_security">Al Fajer (Security & Lifeguards)</option>
                        <option value="contractor_lift">Al Fajer (Elevator Maintenance)</option>
                        <option value="contractor_hvac">Al Fajer (Air Conditioning HVAC)</option>
                        <option value="contractor_fire">Al Fajer (Fire Systems)</option>
                        <option value="contractor_security_systems">Al Fajer (Security Systems Systems)</option>
                        <option value="contractor_audio_visual">Al Fajer (Audio-Visual Services)</option>
                        <option value="contractor_sewage">Al Fajer (Sewage Pumping)</option>
                        <option value="contractor_medical_waste">Al Fajer (Medical Waste Transport)</option>
                        <option value="contractor_waste">Al Fajer (General Waste Transport)</option>
                        <option value="contractor_landscaping">Al Fajer (Landscaping Services)</option>
                        <option value="contractor_flagpole">Al Fajer (Flagpole Maintenance)</option>
                    </select>
                </div>

                <div class="form-input-container">
                    <label>Update Status Classification</label>
                    <select id="drawerStatusUpdate" required>
                        <option value="pending_approval" id="optPending">Pending Triage Approval</option>
                        <option value="active" id="optActive">Active (Dispatched to Field)</option>
                        <option value="resolved" id="optResolved">Resolved (Task Completed)</option>
                    </select>
                </div>
            </div>

            <div id="contractorFeedbackControls" style="display: none;" class="form-input-container">
                <label>Field Technician Diagnostic Resolution Notes</label>
                <textarea id="drawerTechnicianNotes" placeholder="Describe components replaced, metrics monitored, or steps taken..."></textarea>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 16px;">Save Operational Updates</button>
        </form>
    </div>
</div>

<script type="module">
    import { db } from "./firebase.js";
    import { checkAccess } from "./roleguard.js";
    import { loadSidebar } from "./sidebar.js";
    import { collection, getDocs, doc, updateDoc, addDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    let globalActiveTicketsCache = [];
    let authenticatedUserRole = "";

    // Secure Entry Control Guard Initialization
    checkAccess((sessionValidatedRole) => {
        authenticatedUserRole = sessionValidatedRole.toLowerCase().trim();
        document.getElementById("userRole").innerText = sessionValidatedRole.replace('_', ' ').toUpperCase();
        loadSidebar(sessionValidatedRole);
        
        if (authenticatedUserRole === "admin" || authenticatedUserRole === "planner") {
            document.getElementById("openCreateTicketPanelBtn").style.display = "flex";
            document.getElementById("adminRoutingControls").style.display = "flex";
            document.getElementById("contractorAssignmentContainer").style.display = "block";
            document.getElementById("contractorFeedbackControls").style.display = "none";
            document.getElementById("optPending").style.display = "block";
            document.getElementById("optActive").style.display = "block";
        } else if (authenticatedUserRole === "facilities_manager") {
            // Facilities Manager Specific Setup
            document.getElementById("ticketsPageTitleContext").innerText = "Facilities Manager Triage Deck";
            document.getElementById("openCreateTicketPanelBtn").style.display = "none"; // Hide internal log capability
            document.getElementById("adminRoutingControls").style.display = "flex";
            document.getElementById("contractorAssignmentContainer").style.display = "none"; // Hide contractor assignment field
            document.getElementById("contractorFeedbackControls").style.display = "none";
            
            // Limit management options to closing active/resolved logs
            document.getElementById("optPending").style.display = "none";
            document.getElementById("optActive").style.display = "block";
            document.getElementById("optResolved").style.display = "block";
        } else if (authenticatedUserRole.startsWith("contractor")) {
            document.getElementById("openCreateTicketPanelBtn").style.display = "none";
            document.getElementById("adminRoutingControls").style.display = "none";
            document.getElementById("contractorFeedbackControls").style.display = "flex";
            document.getElementById("ticketsPageTitleContext").innerText = "Assigned Field Work Orders";
        }
        
        fetchTicketsDataPipeline();
    });

    // Logout Handler Entry Point
    document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.clear();
        window.location.href = "index.html";
    });

    const createModal = document.getElementById("createTicketModal");
    document.getElementById("openCreateTicketPanelBtn").addEventListener("click", () => {
        createModal.classList.add("active");
    });
    document.getElementById("closeCreateModalBtn").addEventListener("click", () => {
        createModal.classList.remove("active");
    });

    // Process and Create Internal Ticket Directly to Cloud Firestore Collection
    document.getElementById("internalCreateTicketForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById("submitInternalTicketBtn");
        submitBtn.disabled = true;
        submitBtn.innerText = "Transmitting Data Work Order...";

        const referenceId = "TKT-" + Math.floor(100000 + Math.random() * 900000);

        const internalPayload = {
            ticketId: referenceId,
            type: "internal",
            riserDetails: document.getElementById("createRiserDetails").value.trim(),
            locationScope: document.getElementById("createScope").value,
            specificLocation: document.getElementById("createLocationDetail").value.trim(),
            amcCategory: document.getElementById("createCategory").value,
            priority: document.getElementById("createPriority").value,
            description: document.getElementById("createDescription").value.trim(),
            status: "pending_approval",
            reportedDate: new Date().toISOString(),
            assignedContractorUid: null,
            resolvedDate: null
        };

        try {
            await addDoc(collection(db, "maintenance_tickets"), internalPayload);
            createModal.classList.remove("active");
            document.getElementById("internalCreateTicketForm").reset();
            
            submitBtn.disabled = false;
            submitBtn.innerText = "Transmit & Authorize Order";
            
            fetchTicketsDataPipeline(); // Refresh tracking list immediately
        } catch (error) {
            alert("Error creating internal work order: " + error.message);
            submitBtn.disabled = false;
            submitBtn.innerText = "Transmit & Authorize Order";
        }
    });

    // Stream Tickets from Cloud Firestore Collection
    async function fetchTicketsDataPipeline() {
        try {
            const ticketsRef = collection(db, "maintenance_tickets");
            let q;
            
            // 🛡️ Filter the queries based on identity to align with backend Firestore rules safely
            if (authenticatedUserRole === "facilities_manager") {
                q = query(
                    ticketsRef, 
                    where("status", "in", ["active", "resolved", "Closed", "Assigned", "In Progress"]),
                    orderBy("reportedDate", "desc")
                );
            } else {
                q = query(ticketsRef, orderBy("reportedDate", "desc"));
            }
            
            const querySnapshot = await getDocs(q);
            
            let rawCloudRecords = [];
            querySnapshot.forEach((docSnap) => {
                rawCloudRecords.push({
                    docId: docSnap.id,
                    ...docSnap.data()
                });
            });

            if (authenticatedUserRole.startsWith("contractor")) {
                globalActiveTicketsCache = rawCloudRecords.filter(ticket => 
                    ticket.assignedContractorUid === authenticatedUserRole
                );
            } else {
                globalActiveTicketsCache = rawCloudRecords;
            }

            renderTableInterface(globalActiveTicketsCache);
        } catch (error) {
            console.error("Critical Stream Interruption Error: ", error);
            document.getElementById("ticketsTableBody").innerHTML = `
                <tr><td colspan="10" style="text-align:center; color:var(--danger); font-weight:700; padding:30px;">
                    Authentication Data Pipeline Fault: Please ensure Firestore rules match completely.
                </td></tr>`;
        }
    }

    // Render Data Array to Interface Table Engine
    function renderTableInterface(dataItems) {
        const tbody = document.getElementById("ticketsTableBody");
        if (dataItems.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding:40px; color:var(--muted);">No matching operational records mapped to your profile scope.</td></tr>`;
            return;
        }

        let compiledRowsMarkup = "";
        dataItems.forEach((ticket) => {
            let statusText = ticket.status ? ticket.status.replace('_', ' ') : 'Pending Approval';
            let priorityVal = ticket.priority || 'medium';
            let statusVal = ticket.status || 'pending_approval';
            let riserDetails = ticket.riserDetails ? ticket.riserDetails : "N/A (Public Portal)";

            compiledRowsMarkup += `
                <tr>
                    <td style="font-weight:700; color:#1e3a8a;">${ticket.ticketId || 'N/A'}</td>
                    <td style="color:#475569; font-weight:600; font-size:13px;">${riserDetails}</td>
                    <td style="text-transform:uppercase; font-size:11px; font-weight:600;">📍 ${ticket.locationScope || 'General'}</td>
                    <td>${ticket.specificLocation || 'N/A'}</td>
                    <td><code style="background:#f1f5f9; padding:2px 6px; border-radius:4px;">${ticket.amcCategory || 'N/A'}</code></td>
                    <td style="max-width:220px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${ticket.description || ''}">${ticket.description || 'N/A'}</td>
                    <td><span class="badge badge-${priorityVal}">${priorityVal}</span></td>
                    <td><span class="badge badge-${statusVal}">${statusText}</span></td>
                    <td style="font-size:12px; color:var(--muted);">${ticket.reportedDate ? ticket.reportedDate.substring(0,10) : 'N/A'}</td>
                    <td>
                        <button class="btn-primary" style="height:30px; padding:0 12px; font-size:12px; width:auto;" onclick="openTriageDrawer('${ticket.docId}')">
                            Manage
                        </button>
                    </td>
                </tr>
            `;
        });

        tbody.innerHTML = compiledRowsMarkup;
    }

    // Interactive Drawer Overlay Actions Opening Management Mapping Engine
    window.openTriageDrawer = function(documentReferenceId) {
        const targetData = globalActiveTicketsCache.find(t => t.docId === documentReferenceId);
        if (!targetData) return;

        document.getElementById("targetDocumentFirestoreId").value = documentReferenceId;
        document.getElementById("drawerTicketIdTitle").innerText = `Manage: ${targetData.ticketId}`;
        document.getElementById("drawerIssueDescription").value = targetData.description;
        
        if (authenticatedUserRole === "admin" || authenticatedUserRole === "planner" || authenticatedUserRole === "facilities_manager") {
            document.getElementById("drawerContractorAssignment").value = targetData.assignedContractorUid || "";
            document.getElementById("drawerStatusUpdate").value = targetData.status || "pending_approval";
        } else if (authenticatedUserRole.startsWith("contractor")) {
            document.getElementById("drawerTechnicianNotes").value = targetData.technicianNotes || "";
        }

        document.getElementById("ticketActionDrawer").classList.add("active");
    }

    document.getElementById("closeDrawerBtn").addEventListener("click", () => {
        document.getElementById("ticketActionDrawer").classList.remove("active");
    });

    // Process Form Updates and Save Directly Back to Cloud Firestore Document Reference
    document.getElementById("drawerActionForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const firestoreDocId = document.getElementById("targetDocumentFirestoreId").value;
        const targetDocRef = doc(db, "maintenance_tickets", firestoreDocId);
        
        let updatePayload = {};

        if (authenticatedUserRole === "admin" || authenticatedUserRole === "planner" || authenticatedUserRole === "facilities_manager") {
            // Keep the assigned contractor intact for the facilities manager updates
            if (authenticatedUserRole !== "facilities_manager") {
                updatePayload.assignedContractorUid = document.getElementById("drawerContractorAssignment").value;
            }
            updatePayload.status = document.getElementById("drawerStatusUpdate").value;
            if(updatePayload.status === "resolved") {
                updatePayload.resolvedDate = new Date().toISOString();
            }
        } else if (authenticatedUserRole.startsWith("contractor")) {
            const techNotes = document.getElementById("drawerTechnicianNotes").value.trim();
            updatePayload.technicianNotes = techNotes;
            
            if(techNotes.length > 5) {
                updatePayload.status = "resolved";
                updatePayload.resolvedDate = new Date().toISOString();
            }
        }

        try {
            await updateDoc(targetDocRef, updatePayload);
            document.getElementById("ticketActionDrawer").classList.remove("active");
            fetchTicketsDataPipeline();
        } catch (error) {
            alert("Operational Write Exception Error: " + error.message);
        }
    });

    // Real-time Frontend Filtering Infrastructure Logic Engines (Location Selector + Search Bar Input)
    function executeLiveSearchAndFiltersPipeline() {
        const searchKeyword = document.getElementById("tableGlobalSearch").value.toLowerCase().trim();
        const selectedLocation = document.getElementById("globalLocationFilter").value;

        const filteredArray = globalActiveTicketsCache.filter(item => {
            const matchesLocation = (selectedLocation === "all") || (item.locationScope === selectedLocation);
            
            const matchesSearch = !searchKeyword || 
                (item.ticketId && item.ticketId.toLowerCase().includes(searchKeyword)) ||
                (item.riserDetails && item.riserDetails.toLowerCase().includes(searchKeyword)) ||
                (item.amcCategory && item.amcCategory.toLowerCase().includes(searchKeyword)) ||
                (item.description && item.description.toLowerCase().includes(searchKeyword)) ||
                (item.specificLocation && item.specificLocation.toLowerCase().includes(searchKeyword));

            return matchesLocation && matchesSearch;
        });

        renderTableInterface(filteredArray);
    }

    document.getElementById("tableGlobalSearch").addEventListener("input", executeLiveSearchAndFiltersPipeline);
    document.getElementById("globalLocationFilter").addEventListener("change", executeLiveSearchAndFiltersPipeline);
</script>

</body>
</html>
