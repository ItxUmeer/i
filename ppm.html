<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>PPM Schedule</h2>

  <div onclick="toggleNotif()" style="cursor:pointer;">
    🔔 <span id="notifCount" style="color:red;"></span>

    <div id="notifBox" style="
      display:none;
      position:absolute;
      right:20px;
      top:60px;
      width:300px;
      background:white;
      border:1px solid #ccc;
      max-height:300px;
      overflow:auto;
      padding:10px;
    "></div>
  </div>

  <img src="logo-right.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="showTab('create')">Create PPM</button>
  <button onclick="showTab('list')">PPM List</button>
</div>

<div class="main">

<!-- CREATE -->
<div id="create">

  <h3>Create PPM</h3>

  <select id="assetSelect"></select>

  <input id="task" placeholder="Task">
  <input id="frequency" placeholder="Frequency">
  <input id="nextDue" type="date">

  <button onclick="createPPM()">Create</button>

</div>

<!-- LIST -->
<div id="list" style="display:none">

  <h3>PPM List</h3>

  <table border="1" width="100%">
    <thead>
      <tr>
        <th>Asset</th>
        <th>Task</th>
        <th>Next Due</th>
        <th>Status</th>
        <th>Comment</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="ppmList"></tbody>
  </table>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* TAB */
window.showTab=(t)=>{
  create.style.display="none";
  list.style.display="none";
  document.getElementById(t).style.display="block";
};

/* LOAD ASSETS */
async function loadAssets(){
  const snap=await getDocs(collection(db,"assets"));
  let html=`<option>Select Asset</option>`;
  snap.forEach(d=>{
    html+=`<option>${d.data().name}</option>`;
  });
  assetSelect.innerHTML=html;
}

/* CREATE PPM */
window.createPPM = async ()=>{

  await addDoc(collection(db,"ppm"),{
    assetId:assetSelect.value,
    task:task.value,
    frequency:frequency.value,
    nextDue:nextDue.value,
    status:"Pending"
  });

  await addDoc(collection(db,"notifications"),{
    title:"New PPM",
    message:task.value,
    read:false,
    createdAt:new Date()
  });

  loadPPM();
  loadNotifications();
};

/* LOAD PPM */
async function loadPPM(){

  const snap=await getDocs(collection(db,"ppm"));

  let html="";

  snap.forEach(d=>{
    let p=d.data();

    html+=`
    <tr>
      <td>${p.assetId}</td>
      <td>${p.task}</td>
      <td>${p.nextDue}</td>
      <td>${p.status}</td>

      <td>
        <input id="p-${d.id}" placeholder="comment">
      </td>

      <td>
        <button onclick="completePPM('${d.id}')">Complete</button>
      </td>
    </tr>`;
  });

  ppmList.innerHTML=html;
}

/* COMPLETE PPM */
window.completePPM = async(id)=>{

  let comment=document.getElementById("p-"+id).value;

  await updateDoc(doc(db,"ppm",id),{
    status:"Completed",
    comment:comment
  });

  await addDoc(collection(db,"notifications"),{
    title:"PPM Completed",
    message:comment || "Done",
    read:false,
    createdAt:new Date()
  });

  loadPPM();
  loadNotifications();
};

/* NOTIFICATIONS */
window.toggleNotif=()=>{
  notifBox.style.display = notifBox.style.display==="none"?"block":"none";
};

async function loadNotifications(){

  const snap=await getDocs(collection(db,"notifications"));

  let html="";
  let count=0;

  snap.forEach(d=>{
    let n=d.data();
    if(!n.read) count++;

    html+=`
    <div style="border-bottom:1px solid #eee;">
      <b>${n.title}</b><br>
      ${n.message}
      <button onclick="markRead('${d.id}')">✔</button>
    </div>`;
  });

  notifBox.innerHTML=html;
  notifCount.innerText=count?`(${count})`:"";
}

window.markRead=async(id)=>{
  await updateDoc(doc(db,"notifications",id),{read:true});
  loadNotifications();
};

/* INIT */
loadAssets();
loadPPM();
loadNotifications();

</script>

</body>
</html>
