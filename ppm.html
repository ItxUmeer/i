<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
</div>

<div class="main">

<h1>PPM Schedule</h1>

<div id="list"></div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { renderSidebar } from "./sidebar.js";

onAuthStateChanged(auth, async (user) => {

  const snap = await getDoc(doc(db, "users", user.uid));
  renderSidebar(snap.data().role);

  loadPPM();
});

async function loadPPM() {

  const snap = await getDocs(collection(db, "ppm"));

  let html = "";

  snap.forEach(d => {

    const p = d.data();

    html += `
      <div class="card">
        <b>${p.asset}</b><br>
        Next Due: ${p.nextDue}<br>
        Frequency: ${p.frequency}
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

</script>

</body>
</html>
