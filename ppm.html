<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <img src="logo-left.png" style="height:60px">
  <h2>PPM</h2>

  <button onclick="goDashboard()">Dashboard</button>
  <button onclick="logout()">Logout</button>

  <div onclick="toggleNotif()">🔔 <span id="notifCount"></span></div>

  <img src="logo-right.png" style="height:60px">
</div>

<div id="notifBox" style="display:none;position:absolute;right:10px;top:80px;background:white;border:1px solid #ccc;padding:10px;width:300px;"></div>

<div class="main">

<button onclick="showTab('create')">Create</button>
<button onclick="showTab('list')">List</button>

<div id="create">

<select id="assetSelect"></select>
<input id="task">
<input id="nextDue">

<button onclick="createPPM()">Save</button>

</div>

<div id="list" style="display:none">

<table border="1" width="100%">
<thead>
<tr>
<th>Asset</th>
<th>Task</th>
<th>Status</th>
<th>Comment</th>
<th>Action</th>
</tr>
</thead>

<tbody id="ppmList"></tbody>
</table>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* CREATE */
window.createPPM = async () => {

  await addDoc(collection(db,"ppm"), {
    assetId: assetSelect.value,
    task: task.value,
    nextDue: nextDue.value,
    status: "Pending"
  });

  await addNotification("PPM Created", task.value);

  loadPPM();
};

/* LOAD */
async function loadPPM(){

  const snap = await getDocs(collection(db,"ppm"));

  let html="";

  snap.forEach(d=>{
    let p=d.data();

    html += `
    <tr>
      <td>${p.assetId}</td>
      <td>${p.task}</td>
      <td>${p.status}</td>
      <td><input id="p-${d.id}"></td>
      <td><button onclick="completePPM('${d.id}')">Done</button></td>
    </tr>`;
  });

  ppmList.innerHTML = html;
}

/* COMPLETE */
window.completePPM = async (id) => {

  let c = document.getElementById("p-"+id)?.value || "";

  await updateDoc(doc(db,"ppm",id), {
    status:"Completed",
    comment:c
  });

  await addNotification("PPM Done", c);

  loadPPM();
};

/* NOTIFICATIONS */
window.toggleNotif = () => {
  notifBox.style.display = notifBox.style.display === "none" ? "block" : "none";
};

async function addNotification(title,message){
  await addDoc(collection(db,"notifications"),{
    title,message,read:false
  });
}

async function loadNotifications(){
  const snap = await getDocs(collection(db,"notifications"));

  let html="";
  let count=0;

  snap.forEach(d=>{
    let n=d.data();
    if(!n.read) count++;

    html+=`<div><b>${n.title}</b><br>${n.message}</div>`;
  });

  notifBox.innerHTML = html;
  notifCount.innerText = count ? `(${count})` : "";
}

loadPPM();
loadNotifications();
</script>

</body>
</html>
