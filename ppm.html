<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">

  <div class="header-left">
    <img src="logo-left.png" class="logo">
  </div>

  <div class="header-center">
    CMMS Data for DCAS Facility
  </div>

  <div class="header-right">

    <div class="notif">
      🔔 <span id="notifCount"></span>
    </div>

    <button onclick="logout()">Logout</button>

    <img src="logo-right.png" class="logo">

  </div>

</div>

<div class="main">

<h2>PPM</h2>

<select id="assetSelect"></select>
<input id="task" placeholder="Task">
<input id="frequency" placeholder="Frequency">
<input id="nextDue" type="date">
<input id="comment" placeholder="Comment">

<button onclick="createPPM()">Create PPM</button>
<button onclick="window.print()">PDF Report</button>

<table>
<thead>
<tr>
  <th>Asset</th>
  <th>Task</th>
  <th>Frequency</th>
  <th>Next Due</th>
  <th>Comment</th>
  <th>Status</th>
</tr>
</thead>

<tbody id="ppmList"></tbody>
</table>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

/* LOAD ASSETS */
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html="<option>Select Asset</option>";

  snap.forEach(d=>{
    html+=`<option>${d.data().name}</option>`;
  });

  assetSelect.innerHTML=html;
}

/* CREATE PPM */
window.createPPM = async () => {

  await addDoc(collection(db,"ppm"), {
    asset:assetSelect.value,
    task:task.value,
    frequency:frequency.value,
    nextDue:nextDue.value,
    comment:comment.value,
    status:"Pending"
  });

  await addDoc(collection(db,"notifications"), {
    title:"PPM Created",
    message:task.value,
    read:false
  });

  loadPPM();
};

/* LOAD */
async function loadPPM(){

  const snap = await getDocs(collection(db,"ppm"));

  let html="";

  snap.forEach(d=>{
    let p=d.data();

    html+=`
      <tr>
        <td>${p.asset}</td>
        <td>${p.task}</td>
        <td>${p.frequency}</td>
        <td>${p.nextDue}</td>
        <td>${p.comment || ""}</td>
        <td>${p.status}</td>
      </tr>
    `;
  });

  ppmList.innerHTML=html;
}

loadAssets();
loadPPM();

</script>

</body>
</html>
