<!DOCTYPE html>
<html>
<head>
  <title>PPM System</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>PPM</h2>

  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='assets.html'">Assets</button>
  <button onclick="location.href='workorders.html'">Work Orders</button>
</div>

<div class="main">

  <h1>Preventive Maintenance (PPM)</h1>

  <input id="assetId" placeholder="Asset ID">
  <input id="task" placeholder="Task (Filter Cleaning)">
  <input id="nextDue" type="date">

  <select id="frequency">
    <option>Weekly</option>
    <option>Monthly</option>
    <option>Quarterly</option>
    <option>Yearly</option>
  </select>

  <button onclick="addPPM()">Add PPM</button>

  <div id="list"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.addPPM = async function () {

  await addDoc(collection(db,"ppm"),{
    assetId: assetId.value,
    task: task.value,
    nextDue: nextDue.value,
    frequency: frequency.value,
    status: "Pending"
  });

  loadPPM();
};

async function loadPPM() {

  const snap = await getDocs(collection(db,"ppm"));

  list.innerHTML = "";

  snap.forEach(doc => {

    let d = doc.data();

    list.innerHTML += `
      <div class="card">

        <b>${d.assetId}</b><br>
        Task: ${d.task}<br>
        Due: ${d.nextDue}<br>
        Frequency: ${d.frequency}<br>
        Status: ${d.status}

      </div>
    `;
  });
}

loadPPM();

</script>

<script type="module" src="auth.js"></script>

</body>
</html>
