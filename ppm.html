<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>PPM Management</h2>
  <img src="logo-right.png" class="logo">
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- TABS -->
<div class="tab-buttons">
  <button onclick="showTab('add')">Add PPM</button>
  <button onclick="showTab('list')">PPM List</button>
</div>

<!-- ADD PPM -->
<div id="add" class="section">

  <h3>Create PPM</h3>

  <!-- ASSET SELECT -->
  <select id="assetSelect"></select>

  <input id="task" placeholder="Task (Filter Cleaning)">
  <input id="frequency" placeholder="Frequency (Monthly)">
  <input id="nextDue" type="date">

  <button class="action-btn" onclick="createPPM()">Create PPM</button>

</div>

<!-- LIST -->
<div id="list" class="section" style="display:none">

  <h3>PPM List</h3>

  <div id="ppmList"></div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* NAV */
window.go = (p)=>location=p;

/* TAB */
window.showTab = (t)=>{
  add.style.display="none";
  list.style.display="none";
  document.getElementById(t).style.display="block";
};

/* LOAD ASSETS INTO DROPDOWN */
async function loadAssets(){

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d=>{
    const a = d.data();

    html += `
      <option value="${a.name}">
        ${a.name} (${a.building})
      </option>
    `;
  });

  document.getElementById("assetSelect").innerHTML = html;
}

/* CREATE PPM */
window.createPPM = async () => {

  const asset = assetSelect.value;

  if(!asset){
    alert("Select Asset");
    return;
  }

  await addDoc(collection(db,"ppm"), {
    assetId: asset,
    task: task.value,
    frequency: frequency.value,
    nextDue: nextDue.value,
    status: "Pending"
  });

  alert("PPM Created ✔");
  loadPPM();
};

/* LOAD PPM */
async function loadPPM(){

  const snap = await getDocs(collection(db,"ppm"));

  let html = "";

  snap.forEach(d=>{
    const p = d.data();

    html += `
      <div>
        ${p.assetId} > ${p.task} > ${p.frequency} > ${p.nextDue} > ${p.status}
      </div>
    `;
  });

  document.getElementById("ppmList").innerHTML =
    html || "No PPM Records";
}

/* INIT */
loadAssets();
loadPPM();

</script>

</body>
</html>
