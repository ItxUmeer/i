<!DOCTYPE html>
<html>
<head>
<title>PPM System</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h3>CMMS</h3>
  <a href="assets.html">Assets</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
</div>

<div class="main">

<div class="header-bar">
  <img src="logo-left.png">
  <h2>PPM Management</h2>
  <img src="logo-right.png">
</div>

<!-- CREATE PPM -->
<div class="section">

  <h3>Create PPM</h3>

  <select id="assetSelect"></select>

  <input id="task" placeholder="Task">
  <input id="frequency" placeholder="Monthly / Weekly">
  <input id="nextDue" type="date">

  <button onclick="createPPM()">Create PPM</button>

</div>

<!-- PPM LIST -->
<div class="section">

  <h3>PPM List</h3>
  <div id="ppmList"></div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- LOAD ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadAssets();
  loadPPM();
});

/* ---------------- LOAD ASSETS FOR DROPDOWN ---------------- */
async function loadAssets() {

  const snap = await getDocs(collection(db, "assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d => {

    const a = d.data();

    html += `<option value="${a.name}">
      ${a.name} (${a.building})
    </option>`;
  });

  assetSelect.innerHTML = html;
}

/* ---------------- CREATE PPM ---------------- */
window.createPPM = async () => {

  await addDoc(collection(db, "ppm"), {
    assetId: assetSelect.value,
    task: task.value,
    frequency: frequency.value,
    nextDue: nextDue.value,
    status: "Pending"
  });

  alert("PPM Created ✔");
  loadPPM();
};

/* ---------------- LOAD PPM ---------------- */
async function loadPPM() {

  const snap = await getDocs(collection(db, "ppm"));

  let html = "";

  snap.forEach(d => {

    const p = d.data();

    html += `
      <div class="card">
        <b>${p.assetId}</b><br>
        ${p.task}<br>
        ${p.frequency}<br>
        ${p.status}
      </div>
    `;
  });

  document.getElementById("ppmList").innerHTML = html;
}

</script>

</body>
</html>
