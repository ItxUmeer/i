<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
<script src="html2pdf.bundle.min.js"></script>
</head>

<body>

<div class="header">
  <img src="logo-left.png" class="logo">
  <h2>PPM</h2>
  <img src="logo-right.png" class="logo">
</div>

<div class="sidebar">
  <button onclick="showTab('add')">Add</button>
  <button onclick="showTab('list')">List</button>
</div>

<div class="main">

<div id="add">
<select id="assetSelect"></select>
<input id="task" placeholder="Task">
<input id="frequency">
<input id="nextDue" type="date">
<button onclick="createPPM()">Create</button>
</div>

<div id="list" style="display:none">

<button onclick="downloadPDF('ppmReport')">PDF</button>

<div id="ppmReport">
<h2 style="text-align:center;">CMMS Data for DCAS Facility</h2>

<table border="1" width="100%">
<thead>
<tr>
<th>Asset</th><th>Task</th><th>Next Due</th><th>Status</th>
</tr>
</thead>

<tbody id="ppmList"></tbody>
</table>
</div>

</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function loadAssets(){
let snap=await getDocs(collection(db,"assets"));
let html="";
snap.forEach(d=>{
html+=`<option>${d.data().name}</option>`;
});
assetSelect.innerHTML=html;
}

window.createPPM=async()=>{
await addDoc(collection(db,"ppm"),{
assetId:assetSelect.value,
task:task.value,
frequency:frequency.value,
nextDue:nextDue.value,
status:"Pending"
});
loadPPM();
};

async function loadPPM(){
let snap=await getDocs(collection(db,"ppm"));
let html="";
snap.forEach(d=>{
let p=d.data();
html+=`<tr>
<td>${p.assetId}</td>
<td>${p.task}</td>
<td>${p.nextDue}</td>
<td>${p.status}</td>
</tr>`;
});
ppmList.innerHTML=html;
}

window.downloadPDF=(id)=>{
html2pdf().from(document.getElementById(id)).save();
};

loadAssets();
loadPPM();
</script>

</body>
</html>
