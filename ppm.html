<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">PPM Management</div>
  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>PPM</h2>

<select id="ppmAsset"></select>

<input id="ppmTask" placeholder="Task">

<select id="ppmFrequency">
  <option>Monthly</option>
  <option>Quarterly</option>
  <option>Half Yearly</option>
  <option>Yearly</option>
</select>

<input id="ppmDate" type="date">

<input id="ppmComment" placeholder="Comment">

<select id="ppmStatus">
  <option>Pending</option>
  <option>Completed</option>
</select>

<button onclick="addPPM()">Create PPM</button>

<table>
<thead>
<tr>
<th>Asset</th>
<th>Task</th>
<th>Frequency</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ppmList"></tbody>
</table>

</div>

<!-- POPUP -->
<div id="popup" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:1px solid #ccc;">
  <h3>PPM Details</h3>
  <div id="popupContent"></div>
  <button onclick="closePopup()">Close</button>
</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

let currentEditId = null;
let assetsMap = {};

/* ID */
function generatePPMId() {
  return "PPM-" + Math.floor(Math.random() * 100000);
}

/* LOAD ASSETS */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = `<option value="">Select Asset</option>`;

  snap.forEach(d=>{
    let a = d.data();
    assetsMap[d.id] = a;

    html += `<option value="${d.id}">${a.name} (${a.assetId})</option>`;
  });

  ppmAsset.innerHTML = html;
}

/* ADD */
window.addPPM = async () => {

  let assetData = assetsMap[ppmAsset.value] || {};

  await addDoc(collection(db,"ppm"), {
    ppmId: generatePPMId(),
    assetId: ppmAsset.value,
    assetName: assetData.name || "",
    task: ppmTask.value,
    frequency: ppmFrequency.value,
    date: ppmDate.value,
    comment: ppmComment.value,
    status: ppmStatus.value,
    createdAt: serverTimestamp()
  });

  loadPPM();
};

/* LOAD */
async function loadPPM() {

  const snap = await getDocs(collection(db,"ppm"));

  let html = "";

  snap.forEach(d=>{
    let p = d.data();

    html += `
      <tr onclick="viewPPM('${d.id}')">
        <td>${p.assetName}</td>
        <td>${p.task}</td>
        <td>${p.frequency}</td>
        <td>${p.date}</td>
        <td>${p.status}</td>
        <td>
          <button onclick="event.stopPropagation(); editPPM('${d.id}')">Edit</button>
          <button onclick="event.stopPropagation(); deletePPM('${d.id}')">Delete</button>
          <button onclick="event.stopPropagation(); createWO('${d.id}')">Create WO</button>
        </td>
      </tr>
    `;
  });

  ppmList.innerHTML = html;
}

/* VIEW */
window.viewPPM = async (id) => {

  const snap = await getDocs(collection(db,"ppm"));

  snap.forEach(d=>{
    if(d.id === id){
      let p = d.data();

      popupContent.innerHTML = `
        <b>ID:</b> ${p.ppmId}<br>
        <b>Asset:</b> ${p.assetName}<br>
        <b>Task:</b> ${p.task}<br>
        <b>Frequency:</b> ${p.frequency}<br>
        <b>Date:</b> ${p.date}<br>
        <b>Status:</b> ${p.status}<br>
        <b>Comment:</b> ${p.comment}<br>
      `;

      popup.style.display = "block";
    }
  });
};

window.closePopup = () => popup.style.display = "none";

/* DELETE */
window.deletePPM = async (id) => {
  if(confirm("Delete this PPM?")){
    await deleteDoc(doc(db,"ppm",id));
    loadPPM();
  }
};

/* EDIT */
window.editPPM = async (id) => {

  const snap = await getDocs(collection(db,"ppm"));

  snap.forEach(d=>{
    if(d.id === id){
      let p = d.data();

      ppmAsset.value = p.assetId;
      ppmTask.value = p.task;
      ppmFrequency.value = p.frequency;
      ppmDate.value = p.date;
      ppmComment.value = p.comment;
      ppmStatus.value = p.status;

      currentEditId = id;
    }
  });

  document.querySelector("button[onclick='addPPM()']").innerText = "Update PPM";
  document.querySelector("button[onclick='addPPM()']").onclick = updatePPM;
};

/* UPDATE */
window.updatePPM = async () => {

  await updateDoc(doc(db,"ppm",currentEditId), {
    task: ppmTask.value,
    frequency: ppmFrequency.value,
    date: ppmDate.value,
    comment: ppmComment.value,
    status: ppmStatus.value
  });

  currentEditId = null;

  document.querySelector("button").innerText = "Create PPM";
  document.querySelector("button").onclick = addPPM;

  loadPPM();
};

/* 🔥 CREATE WORK ORDER FROM PPM */
window.createWO = async (id) => {

  const snap = await getDocs(collection(db,"ppm"));

  snap.forEach(async d=>{
    if(d.id === id){
      let p = d.data();

      await addDoc(collection(db,"workorders"), {
        woId: "WO-" + Math.floor(Math.random()*100000),
        title: "PPM - " + p.task,
        assetId: p.assetId,
        assetName: p.assetName,
        location: "",
        subLocation: "",
        priority: "Medium",
        status: "Open",
        technician: "",
        createdAt: serverTimestamp()
      });

      alert("Work Order Created from PPM");
    }
  });
};

/* INIT */
loadAssets();
loadPPM();

</script>

</body>
</html>
