<!DOCTYPE html>
<html>
<head>
<title>PPM</title>
<link rel="stylesheet" href="style.css">

<style>
.tabs {
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tabs button {
  padding:10px;
  border:1px solid #ccc;
  background:#fff;
}

.tabs button.active {
  background:#ddd;
}

.formModal {
  display:none;
  position:fixed;
  top:10%;
  left:25%;
  width:50%;
  background:#fff;
  padding:20px;
  border:1px solid #ccc;
}

.formModal input, .formModal select {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">PPM Management</div>
  <div class="header-right">
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>PPM - Site Based</h2>

<!-- SITE TABS -->
<div class="tabs">
  <button onclick="selectSite('HQ', this)" class="active">DCAS Head Quarter</button>
  <button onclick="selectSite('STAFF', this)">DCAS Staff Accommodation</button>
  <button onclick="selectSite('OUTSIDE', this)">DCAS Outside Stations</button>
</div>

<button onclick="openForm()">+ Create PPM</button>

<table>
<thead>
<tr>
<th>Asset</th>
<th>Task</th>
<th>Frequency</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ppmList"></tbody>
</table>

</div>

<!-- FORM -->
<div id="formModal" class="formModal">

<h3>Create PPM</h3>

<select id="ppmAsset"></select>

<input id="ppmTask" placeholder="Task">

<select id="ppmFrequency">
  <option>Monthly</option>
  <option>Quarterly</option>
  <option>Yearly</option>
</select>

<input id="ppmDate" type="date">

<select id="ppmStatus">
  <option>Pending</option>
  <option>Completed</option>
</select>

<button onclick="savePPM()">Save</button>
<button onclick="closeForm()">Cancel</button>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

let currentSite = "HQ";
let assetsMap = {};

/* SELECT SITE */
window.selectSite = (site, btn) => {

  currentSite = site;

  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  loadAssets();
  loadPPM();
};

/* FORM */
window.openForm = () => {
  formModal.style.display = "block";
  loadAssets();
};

window.closeForm = () => formModal.style.display = "none";

/* LOAD ASSETS (FILTERED BY SITE) */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "<option>Select Asset</option>";
  assetsMap = {};

  snap.forEach(d=>{
    let a = d.data();

    if(a.site !== currentSite) return;

    assetsMap[d.id] = a;

    html += `<option value="${d.id}">${a.name}</option>`;
  });

  ppmAsset.innerHTML = html;
}

/* ADD */
window.savePPM = async () => {

  let asset = assetsMap[ppmAsset.value];

  await addDoc(collection(db,"ppm"), {
    site: currentSite,
    assetId: ppmAsset.value,
    assetName: asset?.name || "",
    task: ppmTask.value,
    frequency: ppmFrequency.value,
    date: ppmDate.value,
    status: ppmStatus.value
  });

  closeForm();
  loadPPM();
};

/* LOAD PPM */
async function loadPPM() {

  const snap = await getDocs(collection(db,"ppm"));

  let html = "";

  snap.forEach(d=>{
    let p = d.data();

    if(p.site !== currentSite) return;

    html += `
      <tr>
        <td>${p.assetName}</td>
        <td>${p.task}</td>
        <td>${p.frequency}</td>
        <td>${p.date}</td>
        <td>${p.status}</td>
        <td>
          <button onclick="deletePPM('${d.id}')">Delete</button>
          <button onclick="createWO('${d.id}')">Create WO</button>
        </td>
      </tr>
    `;
  });

  ppmList.innerHTML = html;
}

/* DELETE */
window.deletePPM = async (id) => {
  if(confirm("Delete PPM?")){
    await deleteDoc(doc(db,"ppm",id));
    loadPPM();
  }
};

/* CREATE WO FROM PPM */
window.createWO = async (id) => {

  const snap = await getDocs(collection(db,"ppm"));

  snap.forEach(async d=>{
    if(d.id === id){
      let p = d.data();

      await addDoc(collection(db,"workorders"), {
        site: p.site,
        title: "PPM - " + p.task,
        assetId: p.assetId,
        assetName: p.assetName,
        priority: "Medium",
        status: "Open"
      });

      alert("Work Order Created");
    }
  });
};

/* INIT */
loadAssets();
loadPPM();

</script>

</body>
</html>
