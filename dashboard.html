<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CMMS Dashboard</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* EXTRA SAFETY FIX (prevents "screen out" issue) */
body {
  overflow-x: hidden;
}

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 15px;
}

.kpi {
  background: #111827;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,255,255,0.05);
}

.kpi h3 {
  margin: 0;
  font-size: 14px;
  color: #94a3b8;
}

.kpi p {
  font-size: 22px;
  color: #00e5ff;
  margin: 8px 0 0;
}

.role-box {
  margin-bottom: 15px;
  color: #fbbf24;
}

/* CHART BOX */
.chart-box {
  margin-top: 20px;
  background: #111827;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Dashboard</h1>
  <div class="role-box" id="roleBox">Loading role...</div>

  <!-- KPI -->
  <div class="kpi-grid">

    <div class="kpi">
      <h3>Work Orders</h3>
      <p id="woCount">0</p>
    </div>

    <div class="kpi">
      <h3>Open PPM</h3>
      <p id="ppmCount">0</p>
    </div>

    <div class="kpi">
      <h3>Assets</h3>
      <p id="assetCount">0</p>
    </div>

    <div class="kpi">
      <h3>Closed Jobs</h3>
      <p id="closedCount">0</p>
    </div>

  </div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="kpiChart"></canvas>
  </div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { doc, getDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let role = "";

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // USER ROLE
  const snap = await getDoc(doc(db, "users", user.uid));

  role = snap.exists() ? snap.data().role : "no-role";

  document.getElementById("roleBox").innerText = "Role: " + role;

  renderSidebar(role);

  loadKPIs();
  loadChart();
});


// 🔵 KPI DATA FROM FIRESTORE
async function loadKPIs() {

  const woSnap = await getDocs(collection(db, "workOrders"));
  const assetSnap = await getDocs(collection(db, "assets"));

  let totalWO = 0;
  let closed = 0;

  woSnap.forEach(d => {
    totalWO++;
    if (d.data().status === "Closed") closed++;
  });

  document.getElementById("woCount").innerText = totalWO;
  document.getElementById("closedCount").innerText = closed;

  document.getElementById("assetCount").innerText = assetSnap.size;

  document.getElementById("ppmCount").innerText = 3; // placeholder for now
}


// 📊 CHART (REAL KPI VISUAL)
function loadChart() {

  const ctx = document.getElementById("kpiChart");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["Open", "Closed", "Assets", "PPM"],
      datasets: [{
        label: "CMMS Overview",
        data: [5, 10, 20, 3],
        backgroundColor: ["#00e5ff", "#22c55e", "#fbbf24", "#f97316"]
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: "white" } }
      },
      scales: {
        x: { ticks: { color: "white" } },
        y: { ticks: { color: "white" } }
      }
    }
  });
}


// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
