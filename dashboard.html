<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Dubai CMMS</h2>

  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='assets.html'">Assets</button>
  <button onclick="location.href='workorders.html'">Work Orders</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <h1>Facility Dashboard</h1>

  <div class="kpi-grid">

    <div class="kpi-card">
      <div class="kpi-title">Total Assets</div>
      <div class="kpi-value" id="assetCount">0</div>
    </div>

  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// LOAD DATA
async function loadAssets() {
  const snap = await getDocs(collection(db, "assets"));
  document.getElementById("assetCount").innerText = snap.size;
}

// AUTH CHECK + DATA LOAD
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    loadAssets();
  }
});
</script>

<script type="module" src="auth.js"></script>

</body>
</html>
