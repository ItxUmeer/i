<!DOCTYPE html>
<html>
<head>
  <title>CMMS Dubai Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>CMMS DUBAI</h2>

  <button class="active" onclick="location.href='dashboard.html'">📊 Dashboard</button>
  <button onclick="location.href='assets.html'">🏢 Assets</button>
  <button onclick="location.href='workorders.html'">🛠 Work Orders</button>
  <button onclick="location.href='ppm.html'">📅 PPM</button>
  <button onclick="location.href='technician.html'">👷 Technician</button>

  <hr style="border:1px solid #1f2937">

  <button onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Facility Management Dashboard</h1>

  <!-- KPI GRID -->
  <div class="kpi-grid">

    <div class="kpi-card">
      <div class="kpi-title">Total Assets</div>
      <div class="kpi-value" id="assetCount">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Work Orders</div>
      <div class="kpi-value" id="woCount">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Open Tasks</div>
      <div class="kpi-value" id="openCount">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">PPM Tasks</div>
      <div class="kpi-value" id="ppmCount">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Overdue PPM</div>
      <div class="kpi-value" id="overdueCount">0</div>
    </div>

  </div>

  <!-- CHART SECTION -->
  <div class="kpi-grid">

    <div class="card">
      <h3 style="color:#38bdf8;">Work Orders Status</h3>
      <canvas id="statusChart"></canvas>
    </div>

    <div class="card">
      <h3 style="color:#38bdf8;">System Overview</h3>
      <canvas id="overviewChart"></canvas>
    </div>

  </div>

</div>

<!-- SCRIPT -->
<script type="module">
import { db, auth } from "./firebase.js";
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { generatePPM } from "./ppm-generator.js";

let statusChart, overviewChart;

// AUTH CHECK
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "index.html";
  } else {
    generatePPM(); // AUTO PPM ENGINE
    loadData();
  }
});

// LOGOUT
window.logout = function () {
  signOut(auth);
  window.location.href = "index.html";
};

// LOAD DASHBOARD DATA
async function loadData() {

  const assetsSnap = await getDocs(collection(db, "assets"));
  const woSnap = await getDocs(collection(db, "workOrders"));
  const ppmSnap = await getDocs(collection(db, "ppm"));

  let open = 0;
  let completed = 0;
  let overdue = 0;

  const today = new Date();

  woSnap.forEach(doc => {
    let d = doc.data();
    if (d.status === "Open") open++;
    if (d.status === "Completed") completed++;
  });

  ppmSnap.forEach(doc => {
    let d = doc.data();
    if (d.nextDue && new Date(d.nextDue) < today) {
      overdue++;
    }
  });

  // KPI UPDATE
  document.getElementById("assetCount").innerText = assetsSnap.size;
  document.getElementById("woCount").innerText = woSnap.size;
  document.getElementById("openCount").innerText = open;
  document.getElementById("ppmCount").innerText = ppmSnap.size;
  document.getElementById("overdueCount").innerText = overdue;

  // DESTROY OLD CHARTS
  if (statusChart) statusChart.destroy();
  if (overviewChart) overviewChart.destroy();

  // STATUS CHART
  statusChart = new Chart(document.getElementById("statusChart"), {
    type: "doughnut",
    data: {
      labels: ["Open", "Completed"],
      datasets: [{
        data: [open, completed],
        backgroundColor: ["#f59e0b", "#22c55e"],
        borderWidth: 0
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: {
            color: "#e5e7eb"
          }
        }
      }
    }
  });

  // OVERVIEW CHART
  overviewChart = new Chart(document.getElementById("overviewChart"), {
    type: "bar",
    data: {
      labels: ["Assets", "Work Orders", "PPM", "Overdue"],
      datasets: [{
        label: "System Overview",
        data: [assetsSnap.size, woSnap.size, ppmSnap.size, overdue],
        backgroundColor: [
          "#38bdf8",
          "#6366f1",
          "#f59e0b",
          "#ef4444"
        ],
        borderRadius: 6
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: {
            color: "#e5e7eb"
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#9ca3af" }
        },
        y: {
          ticks: { color: "#9ca3af" }
        }
      }
    }
  });

}

</script>

<script type="module" src="auth.js"></script>

</body>
</html>
