<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS Facilities CMMS - Command Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Block -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle">☰</button>
            <img src="logo-right.png" alt="DCAS Logo" class="header-logo">
            <span class="header-title">DCAS Facilities Center</span>
        </div>
        <div class="user-box">
            <span class="role-badge" id="roleBadge">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <!-- Structural Navigation Sidebar Navigation -->
    <nav class="sidebar" id="sidebarMenu">
        <!-- Injected dynamically by sidebar.js based on role permissions -->
    </nav>

    <!-- Core App Viewport Area -->
    <main class="main-content">
        <div class="welcome-card">
            <h1 id="welcomeGreeting">Welcome to DCAS CMMS Portal</h1>
            <p style="color: var(--muted); margin-top: 5px;">Dubai Corporation for Ambulance Service Facilities Operation Hub</p>
        </div>

        <!-- High Level Operational Cards -->
        <div class="kpi-grid">
            <div class="kpi-card" style="border-left: 4px solid var(--primary);">
                <h3>Pending Actions</h3>
                <p id="kpiPending">-</p>
            </div>
            <div class="kpi-card" style="border-left: 4px solid var(--warning);">
                <h3>Active Work Orders</h3>
                <p id="kpiActive">-</p>
            </div>
            <div class="kpi-card" style="border-left: 4px solid var(--success);">
                <h3>Completed Tasks</h3>
                <p id="kpiCompleted">-</p>
            </div>
        </div>
    </main>

    <!-- App Logic Hook script -->
    <script type="module">
        import { loadSidebar } from "./sidebar.js";
        
        // Mobile Toggle Configuration
        const menuToggle = document.getElementById("menuToggle");
        const sidebarMenu = document.getElementById("sidebarMenu");
        
        menuToggle.addEventListener("click", () => {
            sidebarMenu.classList.toggle("mobile-open");
        });

        // Initialize Dynamic Identity Role Guard Layouts
        document.addEventListener("DOMContentLoaded", () => {
            const preservedRole = localStorage.getItem("userRole") || "staff";
            
            // Set Badge text visually
            document.getElementById("roleBadge").innerText = preservedRole;
            
            // Trigger script template logic to construct your tailored sidebar layout links
            loadSidebar(preservedRole);
        });

        // Simple mock handle to clear local identity tokens on logout
        document.getElementById("logoutBtn").addEventListener("click", () => {
            localStorage.clear();
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
