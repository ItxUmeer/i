<!DOCTYPE html>
<html>
<head>
<title>DCAS CMMS Dashboard</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.kpiBox {
  display:inline-block;
  width:180px;
  padding:15px;
  margin:10px;
  border:1px solid #ccc;
  text-align:center;
}
canvas {
  max-width:400px;
  margin:20px;
}
</style>

</head>

<body>

<div class="header">
  <div class="header-left"><img src="logo-left.png" class="logo"></div>
  <div class="header-center">CMMS DASHBOARD - DCAS FACILITIES MANAGEMENT</div>
  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>
</div>

<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<div class="main">

<h2>Admin Dashboard</h2>

<!-- KPI SECTION -->
<div id="kpis">

  <div class="kpiBox">
    <h3 id="kpiAssets">0</h3>
    <p>Total Assets</p>
  </div>

  <div class="kpiBox">
    <h3 id="kpiOpenWO">0</h3>
    <p>Open Work Orders</p>
  </div>

  <div class="kpiBox">
    <h3 id="kpiClosedWO">0</h3>
    <p>Completed Work Orders</p>
  </div>

  <div class="kpiBox">
    <h3 id="kpiPPM">0</h3>
    <p>Pending PPM</p>
  </div>

  <div class="kpiBox">
    <h3 id="kpiMTTR">0</h3>
    <p>Avg Breakdown Time (hrs)</p>
  </div>

</div>

<!-- GRAPHS -->
<h3>Work Orders Status</h3>
<canvas id="statusChart"></canvas>

<h3>Priority Distribution</h3>
<canvas id="priorityChart"></canvas>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

/* =========================
   LOAD KPI DATA
========================= */
async function loadDashboard() {

  const assetsSnap = await getDocs(collection(db,"assets"));
  const woSnap = await getDocs(collection(db,"workorders"));
  const ppmSnap = await getDocs(collection(db,"ppm"));

  let totalAssets = assetsSnap.size;

  let openWO = 0;
  let closedWO = 0;

  let statusCount = {Open:0, "In Progress":0, Completed:0};
  let priorityCount = {Low:0, Medium:0, High:0, Critical:0};

  let totalTime = 0;
  let completedCount = 0;

  woSnap.forEach(d=>{
    let w = d.data();

    // STATUS KPI
    if(w.status === "Completed") closedWO++;
    else openWO++;

    // STATUS GRAPH
    if(statusCount[w.status] !== undefined)
      statusCount[w.status]++;

    // PRIORITY GRAPH
    if(priorityCount[w.priority] !== undefined)
      priorityCount[w.priority]++;

    // MTTR (basic)
    if(w.status === "Completed" && w.createdAt){
      let created = w.createdAt.toDate();
      let now = new Date();

      let hours = (now - created) / (1000 * 60 * 60);

      totalTime += hours;
      completedCount++;
    }

  });

  let pendingPPM = 0;

  ppmSnap.forEach(d=>{
    if(d.data().status === "Pending") pendingPPM++;
  });

  let avgMTTR = completedCount ? (totalTime / completedCount).toFixed(1) : 0;

  /* SET KPI */
  kpiAssets.innerText = totalAssets;
  kpiOpenWO.innerText = openWO;
  kpiClosedWO.innerText = closedWO;
  kpiPPM.innerText = pendingPPM;
  kpiMTTR.innerText = avgMTTR;

  /* CHARTS */

  new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: Object.keys(statusCount),
      datasets: [{
        data: Object.values(statusCount)
      }]
    }
  });

  new Chart(document.getElementById("priorityChart"), {
    type: "bar",
    data: {
      labels: Object.keys(priorityCount),
      datasets: [{
        data: Object.values(priorityCount)
      }]
    }
  });

}

loadDashboard();

</script>

</body>
</html>
