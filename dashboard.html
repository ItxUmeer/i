<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CMMS</h3>

  <a href="dashboard.html">
    <img src="icon-dashboard.png" width="16"> Dashboard
  </a>

  <a href="assets.html">
    <img src="icon-assets.png" width="16"> Assets
  </a>

  <a href="workorders.html">
    <img src="icon-workorder.png" width="16"> Work Orders
  </a>

  <a href="#" id="logoutBtn">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>CMMS Dashboard - DCAS</h2>
  <img src="logo-right.png">
</div>

<!-- INTRO -->
<div class="section">
  <h3>Welcome to CMMS</h3>
  <p>
    Manage maintenance operations, assets, and preventive schedules
    efficiently for Dubai Corporation for Ambulance Services.
  </p>
</div>

<!-- ROLE -->
<div class="section">
  <h3>Your Access</h3>
  <p id="roleText">Loading...</p>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  location="login.html";
};

// AUTH
onAuthStateChanged(auth, async (user)=>{

  if(!user){
    location="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));

  const role = snap.data().role;

  document.getElementById("roleText").innerText =
    "Logged in as: " + role;
});

</script>

</body>
</html>
