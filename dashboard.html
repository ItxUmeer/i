<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>CMMS Admin</h2>
  <div id="menu"></div>
  <a href="#" id="logoutBtn">Logout</a>
</div>

<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>Admin Dashboard</h2>
  <img src="logo-right.png">
</div>

<!-- KPI -->
<div class="kpi-grid">
  <div class="kpi"><b>Total WO</b><p id="totalWO">0</p></div>
  <div class="kpi"><b>Open</b><p id="openWO">0</p></div>
  <div class="kpi"><b>Closed</b><p id="closedWO">0</p></div>
</div>

<!-- CHART -->
<div class="section">
  <canvas id="chart"></canvas>
</div>

<!-- CREATE WORK ORDER -->
<div class="section">
  <h3>Create Work Order</h3>

  <div class="form-grid">
    <input id="title" placeholder="Work Order Title">
    <input id="asset" placeholder="Asset Name">

    <!-- 🔥 USER DROPDOWN -->
    <select id="userSelect">
      <option value="">Select User</option>
    </select>
  </div>

  <button id="createBtn">Create Work Order</button>
</div>

<!-- WORK ORDER TABLE -->
<div class="section">
  <h3>Work Order List</h3>
  <div id="woTable"></div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

import { renderSidebar } from "./sidebar.js";

let chart;

// 🔐 LOGOUT
document.getElementById("logoutBtn").onclick = async () => {
  await signOut(auth);
  window.location.href = "index.html";
};

// 🔐 AUTH
onAuthStateChanged(auth, async (user) => {

  if (!user) return (location = "index.html");

  renderSidebar("admin");

  await loadUsers();
  await loadDashboard();
  await loadTable();
});


// 👤 LOAD USERS (DROPDOWN FIX)
async function loadUsers() {

  const snap = await getDocs(collection(db, "users"));

  let html = `<option value="">Select User</option>`;

  snap.forEach(d => {
    const u = d.data();
    html += `<option value="${d.id}">
      ${u.name} (${u.role})
    </option>`;
  });

  document.getElementById("userSelect").innerHTML = html;
}
