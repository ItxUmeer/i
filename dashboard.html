<!DOCTYPE html>
<html>
<head>
<title>CMMS Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>

/* GLOBAL LAYOUT FIX */
body {
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  left:0;
  top:0;
  width:220px;
  height:100vh;
  background:#0f172a;
  color:white;
  padding:20px;
}

.sidebar h3 {
  color:white;
  margin-bottom:20px;
}

.sidebar a {
  display:block;
  color:#cbd5e1;
  padding:10px;
  text-decoration:none;
  border-radius:6px;
}

.sidebar a:hover {
  background:#1e293b;
  color:white;
}

/* MAIN AREA */
.main {
  margin-left:240px;
  padding:20px;
}

/* HEADER */
.header {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* KPI GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.card h2 {
  color:#2563eb;
  font-size:28px;
}

/* NAV BUTTONS */
.nav {
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.btn {
  background:#2563eb;
  color:white;
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.btn:hover {
  background:#1d4ed8;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>CMMS Admin</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="assets_list.html">Assets List</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
  <a href="users.html">Users</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header">
  <h2>Admin Dashboard</h2>
  <p>CMMS Control Panel</p>
</div>

<!-- KPI -->
<div class="grid">

  <div class="card">
    <h2 id="a">0</h2>
    <p>Assets</p>
  </div>

  <div class="card">
    <h2 id="p">0</h2>
    <p>PPM</p>
  </div>

  <div class="card">
    <h2 id="w">0</h2>
    <p>Work Orders</p>
  </div>

</div>

<!-- NAV -->
<div class="nav">

  <div class="btn" onclick="go('assets.html')">Assets</div>
  <div class="btn" onclick="go('assets_list.html')">Assets List</div>
  <div class="btn" onclick="go('ppm.html')">PPM</div>

  <div class="btn" onclick="go('workorders.html')">Work Orders</div>
  <div class="btn" onclick="go('users.html')">Users</div>
  <div class="btn" onclick="go('supervisor.html')">Supervisor</div>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* LOAD COUNTS */
async function load() {

  const a = await getDocs(collection(db,"assets"));
  const p = await getDocs(collection(db,"ppm"));
  const w = await getDocs(collection(db,"workOrders"));

  document.getElementById("a").innerText = a.size;
  document.getElementById("p").innerText = p.size;
  document.getElementById("w").innerText = w.size;
}

load();

window.go = (p)=>location=p;

</script>

</body>
</html>
