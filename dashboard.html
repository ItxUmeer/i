<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CMMS</h3>

  <a href="workorders.html">Work Orders</a>
  <a href="assets.html">Assets</a>
  <a href="ppm.html">PPM</a>
  <a href="#">Reports</a>
  <a href="#">Users</a>
  <a href="#">Charts</a>

  <hr>

  <a href="#" id="logoutBtn">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">

  <img src="logo-left.png">

  <h2>CMMS Dashboard - DCAS</h2>

  <div style="position:relative">
    <img src="logo-right.png" onclick="toggleRole()" style="cursor:pointer">

    <div id="roleBox" class="role-box">
      <b>Your Access</b>
      <p id="roleText">Loading...</p>
    </div>
  </div>

</div>

<!-- INTRO -->
<div class="section">
  <h3>Welcome</h3>
  <p>This system manages CMMS operations for DCAS.</p>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

// LOGOUT
logoutBtn.onclick = async ()=>{
  await signOut(auth);
  location="login.html";
};

// ROLE TOGGLE
window.toggleRole = ()=>{
  const box = document.getElementById("roleBox");
  box.style.display = box.style.display==="block"?"none":"block";
};

// AUTH
onAuthStateChanged(auth, async(user)=>{

  if(!user){
    location="login.html";
    return;
  }

  const snap = await getDoc(doc(db,"users",user.uid));
  const role = snap.data().role;

  document.getElementById("roleText").innerText =
    "You are logged in as: " + role;

});

</script>

</body>
</html>
