<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
body {
  background:#f5f7fb;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.card h2 {
  color:#2563eb;
  font-size:30px;
}

.nav {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
  margin:20px;
}

.btn {
  background:#2563eb;
  color:white;
  padding:15px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
}
</style>

</head>

<body>

<h2 style="text-align:center;">CMMS Admin Dashboard</h2>

<!-- KPI -->
<div class="grid">

  <div class="card">
    <h2 id="a">0</h2>
    <p>Assets</p>
  </div>

  <div class="card">
    <h2 id="p">0</h2>
    <p>PPM</p>
  </div>

  <div class="card">
    <h2 id="w">0</h2>
    <p>Work Orders</p>
  </div>

</div>

<!-- NAV -->
<div class="nav">

  <div class="btn" onclick="go('assets.html')">Assets</div>
  <div class="btn" onclick="go('assets_list.html')">Assets List</div>
  <div class="btn" onclick="go('ppm.html')">PPM</div>

  <div class="btn" onclick="go('workorders.html')">Work Orders</div>
  <div class="btn" onclick="go('users.html')">Users</div>
  <div class="btn" onclick="go('supervisor.html')">Supervisor</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function load() {

  const a = await getDocs(collection(db,"assets"));
  const p = await getDocs(collection(db,"ppm"));
  const w = await getDocs(collection(db,"workOrders"));

  document.getElementById("a").innerText = a.size;
  document.getElementById("p").innerText = p.size;
  document.getElementById("w").innerText = w.size;
}

load();

window.go = (p)=>location=p;

</script>

</body>
</html>
