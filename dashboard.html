<!DOCTYPE html>
<html>
<head>
<title>CMMS Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
@media print {
  .sidebar, button, .tabs { display:none !important; }
  @page { size: A4 landscape; }
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="header-left">
    <img src="logo-left.png" class="logo">
  </div>

  <div class="header-center">
    CMMS DASHBOARD - DCAS FACILITY
  </div>

  <div class="header-right">
    🔔 <span id="notifCount"></span>
    <button onclick="logout()">Logout</button>
    <img src="logo-right.png" class="logo">
  </div>

</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <button onclick="go('dashboard.html')">Dashboard</button>
  <button onclick="go('assets.html')">Assets</button>
  <button onclick="go('ppm.html')">PPM</button>
  <button onclick="go('workorders.html')">Work Orders</button>
</div>

<!-- MAIN -->
<div class="main">

<h2>Admin Dashboard</h2>

<!-- TABS -->
<div class="tabs">

  <button onclick="showTab('assetsTab')">Assets</button>
  <button onclick="showTab('ppmTab')">PPM</button>
  <button onclick="showTab('woTab')">Work Orders</button>

  <button onclick="window.print()">PDF Report</button>

</div>

<br>

<!-- =========================
     ASSETS TAB
========================= -->
<div id="assetsTab" class="tabSection">

  <h3>Assets Overview</h3>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Building</th>
        <th>Location</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dashAssets"></tbody>
  </table>

</div>

<!-- =========================
     PPM TAB
========================= -->
<div id="ppmTab" class="tabSection" style="display:none">

  <h3>PPM Overview</h3>

  <table>
    <thead>
      <tr>
        <th>Asset</th>
        <th>Task</th>
        <th>Frequency</th>
        <th>Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dashPPM"></tbody>
  </table>

</div>

<!-- =========================
     WORK ORDERS TAB
========================= -->
<div id="woTab" class="tabSection" style="display:none">

  <h3>Work Orders Overview</h3>

  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Asset</th>
        <th>Location</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="dashWO"></tbody>
  </table>

</div>

</div>

<script type="module">

import { db } from "./firebase.js";
import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

window.go = (p)=>location=p;
window.logout = ()=>location="login.html";

/* =========================
   TAB SWITCH
========================= */
window.showTab = (id) => {

  document.querySelectorAll(".tabSection").forEach(t=>{
    t.style.display = "none";
  });

  document.getElementById(id).style.display = "block";
};

/* =========================
   LOAD ASSETS
========================= */
async function loadAssets() {

  const snap = await getDocs(collection(db,"assets"));

  let html = "";

  snap.forEach(d=>{
    let a = d.data();

    html += `
      <tr>
        <td>${a.name}</td>
        <td>${a.type}</td>
        <td>${a.building}</td>
        <td>${a.location}</td>
        <td>${a.status}</td>
      </tr>
    `;
  });

  dashAssets.innerHTML = html;
}

/* =========================
   LOAD PPM
========================= */
async function loadPPM() {

  const snap = await getDocs(collection(db,"ppm"));

  let html = "";

  snap.forEach(d=>{
    let p = d.data();

    html += `
      <tr>
        <td>${p.asset}</td>
        <td>${p.task}</td>
        <td>${p.frequency}</td>
        <td>${p.date}</td>
        <td>${p.status}</td>
      </tr>
    `;
  });

  dashPPM.innerHTML = html;
}

/* =========================
   LOAD WORK ORDERS
========================= */
async function loadWO() {

  const snap = await getDocs(collection(db,"workOrders"));

  let html = "";

  snap.forEach(d=>{
    let w = d.data();

    html += `
      <tr>
        <td>${w.title}</td>
        <td>${w.asset}</td>
        <td>${w.location}</td>
        <td>${w.status}</td>
      </tr>
    `;
  });

  dashWO.innerHTML = html;
}

/* INIT */
loadAssets();
loadPPM();
loadWO();

</script>

</body>
</html>
