<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CMMS Dashboard</title>

<!-- CHART JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b1220;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 240px;
  background: #0f172a;
  height: 100vh;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,255,255,0.05);
}

.sidebar h2 {
  color: #00e5ff;
  text-shadow: 0 0 10px #00e5ff;
}

.sidebar a {
  display: block;
  padding: 10px;
  margin-top: 6px;
  color: white;
  text-decoration: none;
  border-radius: 6px;
  transition: 0.3s;
}

.sidebar a:hover {
  background: #1e293b;
  box-shadow: 0 0 10px #00e5ff;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

/* KPI CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: linear-gradient(145deg, #111827, #0f172a);
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,255,255,0.05);
  position: relative;
  overflow: hidden;
}

.card h3 {
  margin: 0;
  font-size: 14px;
  color: #94a3b8;
}

.card p {
  font-size: 22px;
  margin: 8px 0 0;
  color: #00e5ff;
}

/* PROGRESS BAR */
.progress {
  height: 6px;
  background: #1e293b;
  border-radius: 5px;
  margin-top: 10px;
  overflow: hidden;
}

.progress span {
  display: block;
  height: 100%;
  background: linear-gradient(90deg, #00e5ff, #38bdf8);
}

/* CHART AREA */
.chart-box {
  margin-top: 25px;
  background: #111827;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,255,0.05);
}

/* ROLE */
.role-box {
  margin-bottom: 15px;
  color: #fbbf24;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
  <a href="#" onclick="logout()">Logout</a>
</div>

<!-- MAIN -->
<div class="main">

  <h1>Dashboard</h1>
  <div class="role-box" id="roleBox"></div>

  <!-- KPI CARDS -->
  <div class="cards">

    <div class="card">
      <h3>Work Orders</h3>
      <p>24</p>
      <div class="progress"><span style="width:70%"></span></div>
    </div>

    <div class="card">
      <h3>PPM Completed</h3>
      <p>12</p>
      <div class="progress"><span style="width:45%"></span></div>
    </div>

    <div class="card">
      <h3>Assets</h3>
      <p>158</p>
      <div class="progress"><span style="width:85%"></span></div>
    </div>

    <div class="card">
      <h3>Open Issues</h3>
      <p>7</p>
      <div class="progress"><span style="width:30%"></span></div>
    </div>

  </div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="workChart"></canvas>
  </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3PK51x0QAqT_DJHasx0bn3Cww2Q5j0_A",
  authDomain: "mep-maintenance-system.firebaseapp.com",
  projectId: "mep-maintenance-system",
  storageBucket: "mep-maintenance-system.appspot.com",
  messagingSenderId: "449309293495",
  appId: "1:449309293495:web:061124ae9f1c990e388632"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const menu = document.getElementById("menu");
const roleBox = document.getElementById("roleBox");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  const snap = await getDoc(doc(db, "users", user.uid));

  const role = snap.exists() ? snap.data().role : "no-role";

  roleBox.innerText = "Role: " + role;

  menu.innerHTML = "";

  if (role === "admin") {
    menu.innerHTML += `<a href="#">Dashboard</a>`;
    menu.innerHTML += `<a href="#">Users</a>`;
    menu.innerHTML += `<a href="#">Work Orders</a>`;
    menu.innerHTML += `<a href="#">Assets</a>`;
    menu.innerHTML += `<a href="#">PPM</a>`;
  }

  else if (role === "facilities_supervisor") {
    menu.innerHTML += `<a href="#">Approve Work Orders</a>`;
    menu.innerHTML += `<a href="#">PPM Schedule</a>`;
    menu.innerHTML += `<a href="#">Assets</a>`;
  }

  else if (role === "assets_officer") {
    menu.innerHTML += `<a href="#">Assets</a>`;
    menu.innerHTML += `<a href="#">Add Asset</a>`;
  }

  else if (role === "maintenance") {
    menu.innerHTML += `<a href="#">My Work Orders</a>`;
    menu.innerHTML += `<a href="#">Update Status</a>`;
  }

  // 📊 CHART (CANDLE / BAR STYLE)
  const ctx = document.getElementById('workChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'],
      datasets: [{
        label: 'Work Orders',
        data: [5, 8, 6, 10, 7],
        backgroundColor: '#00e5ff'
      }]
    },
    options: {
      plugins: {
        legend: { labels: { color: 'white' } }
      },
      scales: {
        x: { ticks: { color: 'white' } },
        y: { ticks: { color: 'white' } }
      }
    }
  });

});

window.logout = async function () {
  await signOut(auth);
  window.location.href = "index.html";
};

</script>

</body>
</html>
