<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
</div>

<div class="main">

<div class="header-bar">
  <img src="logo-left.png">
  <h2>Dashboard</h2>
  <img src="logo-right.png">
</div>

<div class="kpi-grid">
  <div class="kpi"><p id="wo">0</p>Work Orders</div>
  <div class="kpi"><p id="asset">0</p>Assets</div>
</div>

<canvas id="chart"></canvas>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { renderSidebar } from "./sidebar.js";

let chart;

onAuthStateChanged(auth, async user=>{
  renderSidebar("admin");

  const wo = await getDocs(collection(db,"workOrders"));
  const asset = await getDocs(collection(db,"assets"));

  document.getElementById("wo").innerText = wo.size;
  document.getElementById("asset").innerText = asset.size;

  chart = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Work Orders","Assets"],
      datasets:[{data:[wo.size, asset.size], backgroundColor:["#0ea5e9","#ef4444"]}]
    }
  });
});
</script>

</body>
</html>
