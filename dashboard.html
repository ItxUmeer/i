<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>CMMS</h2>
  <div id="menu"></div>
</div>

<div class="main">

<div class="header-bar">
  <img src="logo-left.png">
  <h2>Dashboard</h2>
  <img src="logo-right.png">
</div>

<div class="kpi-grid">
  <div class="kpi"><p id="wo"></p>Total WO</div>
  <div class="kpi"><p id="open"></p>Open</div>
  <div class="kpi"><p id="closed"></p>Closed</div>
</div>

<div class="section">
  <canvas id="chart"></canvas>
</div>

<div class="section">
  <h3>Create Work Order</h3>
  <div class="form-grid">
    <input id="title" placeholder="Title">
    <input id="asset" placeholder="Asset">
    <input id="assign" placeholder="Assign UID">
  </div>
  <button onclick="createWO()">Create</button>
</div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

async function load(){
  const snap = await getDocs(collection(db,"workOrders"));

  let open=0, closed=0;

  snap.forEach(d=>{
    if(d.data().status==="Closed") closed++;
    else open++;
  });

  wo.innerText=snap.size;
  open.innerText=open;
  closed.innerText=closed;

  new Chart(chart,{
    type:"bar",
    data:{
      labels:["Open","Closed"],
      datasets:[{
        data:[open,closed],
        backgroundColor:["#2563eb","#ef4444"]
      }]
    }
  });
}

window.createWO = async ()=>{
  await addDoc(collection(db,"workOrders"),{
    title:title.value,
    asset:asset.value,
    assignedTo:assign.value,
    status:"Open"
  });
  load();
};

load();
</script>

</body>
</html>
