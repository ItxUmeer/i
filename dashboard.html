<!DOCTYPE html>
<html>
<head>
<title>CMMS Admin Dashboard</title>
<link rel="stylesheet" href="style.css">

<style>
.dashboard-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:15px;
}

.card-box {
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  text-align:center;
}

.card-box h2 {
  margin:0;
  font-size:28px;
  color:#2563eb;
}

.card-box p {
  margin:5px 0;
  color:#666;
}

.nav-grid {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:15px;
  margin-top:20px;
}

.nav-btn {
  background:#2563eb;
  color:white;
  padding:15px;
  text-align:center;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.nav-btn:hover {
  background:#1d4ed8;
  transform:scale(1.03);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <h3>CMMS Admin</h3>

  <a href="dashboard.html">Dashboard</a>
  <a href="assets.html">Assets</a>
  <a href="assets_list.html">Assets List</a>
  <a href="ppm.html">PPM</a>
  <a href="workorders.html">Work Orders</a>
  <a href="users.html">Users</a>

  <hr>

  <a href="#" onclick="logout()">Logout</a>

</div>

<!-- MAIN -->
<div class="main">

<!-- HEADER -->
<div class="header-bar">
  <img src="logo-left.png">
  <h2>CMMS Admin Dashboard</h2>
  <img src="logo-right.png">
</div>

<!-- KPI CARDS -->
<div class="dashboard-grid">

  <div class="card-box">
    <h2 id="assetCount">0</h2>
    <p>Assets</p>
  </div>

  <div class="card-box">
    <h2 id="ppmCount">0</h2>
    <p>PPM Tasks</p>
  </div>

  <div class="card-box">
    <h2 id="woCount">0</h2>
    <p>Work Orders</p>
  </div>

</div>

<!-- NAVIGATION -->
<div class="nav-grid">

  <div class="nav-btn" onclick="go('assets.html')">Assets Management</div>
  <div class="nav-btn" onclick="go('assets_list.html')">Assets List</div>
  <div class="nav-btn" onclick="go('ppm.html')">PPM System</div>

  <div class="nav-btn" onclick="go('workorders.html')">Work Orders</div>
  <div class="nav-btn" onclick="go('users.html')">User Management</div>
  <div class="nav-btn" onclick="go('supervisor.html')">Supervisor Panel</div>

</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

/* ---------------- AUTH ---------------- */
auth.onAuthStateChanged(async (user) => {

  if (!user) location = "login.html";

  loadCounts();
});

/* ---------------- LOAD KPI COUNTS ---------------- */
async function loadCounts() {

  const assets = await getDocs(collection(db, "assets"));
  const ppm = await getDocs(collection(db, "ppm"));
  const wo = await getDocs(collection(db, "workOrders"));

  document.getElementById("assetCount").innerText = assets.size;
  document.getElementById("ppmCount").innerText = ppm.size;
  document.getElementById("woCount").innerText = wo.size;
}

/* ---------------- NAVIGATION ---------------- */
window.go = (page) => {
  location = page;
};

/* ---------------- LOGOUT ---------------- */
window.logout = async () => {
  await auth.signOut();
  location = "login.html";
};

</script>

</body>
</html>
