<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCAS CMMS - Control Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuBtn">☰</button>
            <span class="header-title">DCAS Facilities CMMS</span>
        </div>

        <div class="user-box">
            <span class="role-badge" id="userRole">Checking...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <div id="sidebarMenu"></div>
    </aside>

    <main class="main-content">
        <div class="page-title" id="welcomeMessage">Control Dashboard</div>

        <div class="kpi-grid">
            <div class="kpi-card" style="border-top: 4px solid var(--primary);">
                <h3>Open Requests</h3>
                <p id="countRequests">0</p>
            </div>

            <div class="kpi-card" style="border-top: 4px solid var(--warning);">
                <h3>Pending Approval</h3>
                <p id="countApprovals">0</p>
            </div>

            <div class="kpi-card" style="border-top: 4px solid var(--success);">
                <h3>Open Work Orders</h3>
                <p id="countWorkorders">0</p>
            </div>

            <div class="kpi-card" style="border-top: 4px solid var(--danger);">
                <h3>PPM Due</h3>
                <p id="countPPM">0</p>
            </div>
        </div>
    </main>

    <script type="module">
        import { checkAccess } from "./roleguard.js";
        import { loadSidebar } from "./sidebar.js";
        import { auth } from "./firebase.js";

        // Execute asynchronous checks safely via functional callbacks
        checkAccess((role) => {
            // 1. Output verified role status inside upper UI Badge
            document.getElementById("userRole").innerText = role;
            
            // 2. Adjust core header welcome title dynamically
            document.getElementById("welcomeMessage").innerText = `${role.toUpperCase()} Control Hub`;
            
            // 3. Mount tailored navigational systems programmatically
            loadSidebar(role);
        });

        // Handle Responsive Mobile View Sidebar Drawer State toggles
        document.getElementById("menuBtn").onclick = () => {
            document.getElementById("sidebar").classList.toggle("mobile-open");
        };

        // Terminate and purge session tokens safely on clear intent
        document.getElementById("logoutBtn").onclick = async () => {
            localStorage.clear();
            await auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
</html>
