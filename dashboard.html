<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header class="header">

<button id="menuBtn">
☰
</button>

<div class="header-title">
DCAS Facilities CMMS
</div>

<div class="user-box">

<span id="userRole"></span>

<button id="logoutBtn">
Logout
</button>

</div>

</header>

<aside class="sidebar"
id="sidebar">

<div id="sidebarMenu"></div>

</aside>

<main class="main-content">

<div class="page-title">
Dashboard
</div>

<div class="kpi-grid">

<div class="kpi-card">
<h3>Open Requests</h3>
<p>0</p>
</div>

<div class="kpi-card">
<h3>Pending Approval</h3>
<p>0</p>
</div>

<div class="kpi-card">
<h3>Open Work Orders</h3>
<p>0</p>
</div>

<div class="kpi-card">
<h3>PPM Due</h3>
<p>0</p>
</div>

</div>

</main>

<script type="module">

import { checkAccess }
from "./roleguard.js";

import { loadSidebar }
from "./sidebar.js";

const role =
checkAccess();

document.getElementById(
"userRole"
).innerText = role;

loadSidebar(role);

document.getElementById(
"menuBtn"
).onclick = ()=>{

document.getElementById(
"sidebar"
).classList.toggle(
"mobile-open"
);

};

document.getElementById(
"logoutBtn"
).onclick = ()=>{

localStorage.clear();

window.location.href =
"login.html";

};

</script>

</body>
</html>
