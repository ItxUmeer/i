<!DOCTYPE html>
<html>
<head>
  <title>CMMS Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Dubai CMMS</h2>
  <button onclick="location.href='dashboard.html'">Dashboard</button>
  <button onclick="location.href='assets.html'">Assets</button>
  <button onclick="location.href='workorders.html'">Work Orders</button>
</div>

<div class="main">

  <h1>Facility Management Dashboard</h1>

  <!-- KPI SECTION -->
  <div class="kpi-grid">

    <div class="kpi-card">
      <div class="kpi-title">Total Assets</div>
      <div class="kpi-value" id="assetCount">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Active Work Orders</div>
      <div class="kpi-value">12</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">PPM Due</div>
      <div class="kpi-value">5</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-title">Overdue Tasks</div>
      <div class="kpi-value">2</div>
    </div>

  </div>

</div>

</body>
</html>
